<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>さんぽパレット | Sanpo Palette</title>
    
    <!-- CDNs -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            /* Default (Spring) */
            --primary: #FFB7C5; /* Sakura Pink */
            --secondary: #87A96B; /* Fresh Leaf Green */
            --sage: var(--secondary);
            --sand: #FDFBF7;
            --wood: #2D241E;
            --midnight: #02040A;
            --navy-card: #0A1023;
            --moon: #F4D03F;
            --accent: var(--primary);
        }
        
        body {
            font-family: 'Zen Maru Gothic', sans-serif;
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
            background-color: var(--sand);
            color: var(--wood);
        }

        /* 地図の回転コンテナ */
        #map-wrapper {
            width: 100%;
            height: 40vh;
            overflow: hidden;
            border-radius: 2.5rem;
            position: relative;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            border: 4px solid white;
            transition: border-color 0.6s;
            z-index: 10;
        }
        
        #map {
            width: 100%;
            height: 100%;
            transition: transform 0.4s ease-out;
        }

        /* タブ切り替え */
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.4s ease-out; }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 深夜モード */
        .midnight-mode {
            background-color: var(--midnight) !important;
            color: #FFFFFF !important;
        }
        .midnight-mode .card-bg {
            background-color: var(--navy-card) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            color: #FFFFFF !important;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5) !important;
        }
        .midnight-mode #map-wrapper { border-color: rgba(255, 255, 255, 0.1); }
        .midnight-mode .nav-active { color: var(--moon) !important; }
        .midnight-mode .text-moon { color: var(--moon) !important; }
        .midnight-mode .bg-accent { background-color: var(--moon) !important; }
        .midnight-mode .text-accent { color: var(--moon) !important; }
        
        /* 崩壊モード (Collapse Mode) */
        .collapse-mode {
            background-color: #2B1D1D !important;
            color: #D4A373 !important;
        }
        .collapse-mode .card-bg {
            background-color: #3D2B2B !important;
            border: 1px solid #8B4513 !important;
            color: #D4A373 !important;
        }
        .collapse-mode .leaflet-tile-pane {
            filter: sepia(1) saturate(0.5) brightness(0.8) contrast(1.2) !important;
        }
        .collapse-mode .bg-accent, .collapse-mode .bg-secondary { background-color: #FF4500 !important; }
        .collapse-mode .text-accent, .collapse-mode .text-secondary { color: #FF4500 !important; }

        .glitch { animation: glitch-anim 0.3s infinite; }
        @keyframes glitch-anim {
            0% { transform: translate(0); }
            25% { transform: translate(-2px, 2px); }
            50% { transform: translate(2px, -2px); }
            75% { transform: translate(-1px, -1px); }
            100% { transform: translate(0); }
        }

        /* 通常モードのアクセント */
        .bg-accent { background-color: var(--accent); }
        .text-accent { color: var(--accent); }
        .bg-secondary { background-color: var(--secondary); }
        .text-secondary { color: var(--secondary); }

        /* ナビゲーションカード */
        #nav-step-card {
            transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform: translateY(-150%);
            z-index: 1000;
        }
        #nav-step-card.visible { transform: translateY(0); }

        /* 親密度ゲージ */
        .gauge-container {
            height: 12px;
            background: rgba(0,0,0,0.05);
            border-radius: 6px;
            overflow: hidden;
        }
        .midnight-mode .gauge-container { background: rgba(255,255,255,0.1); }
        .gauge-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--secondary), var(--primary));
            transition: width 1s ease-in-out;
        }
        .midnight-mode .gauge-fill { background: linear-gradient(90deg, var(--moon), #FFFFFF); }

        /* Leaflet Tile Filter for Dark Mode */
        .midnight-mode .leaflet-tile-pane {
            filter: invert(100%) hue-rotate(180deg) brightness(95%) contrast(90%);
        }

        .pulse { animation: pulse-animation 2s infinite; }
        @keyframes pulse-animation {
            0% { box-shadow: 0 0 0 0px rgba(0, 0, 0, 0.1); }
            100% { box-shadow: 0 0 0 20px rgba(0, 0, 0, 0); }
        }

        /* 猫のアイコンアニメーション */
        .cat-marker {
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
            transition: all 0.5s ease;
        }
        .heart-pop {
            animation: heart-pop 1.5s ease-out infinite;
        }
        @keyframes heart-pop {
            0% { transform: scale(0) translateY(0); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: scale(1.5) translateY(-20px); opacity: 0; }
        }
    </style>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        midnight: '#02040A',
                        moon: '#F4D03F',
                    }
                }
            }
        }
    </script>
</head>
<body class="pb-32 min-h-screen">

    <!-- ナビゲーション・オーバーレイ (上部) -->
    <div id="nav-step-card" class="fixed top-4 left-4 right-4 p-6 rounded-[2.5rem] shadow-2xl flex items-center gap-6 bg-white card-bg border-2 border-black/5">
        <div id="nav-arrow-box" class="w-20 h-20 rounded-3xl bg-secondary text-white flex items-center justify-center shadow-xl">
            <i data-lucide="arrow-up" size="48" id="nav-arrow-icon"></i>
        </div>
        <div class="flex-1">
            <div class="flex items-end gap-2 mb-1">
                <span id="nav-dist" class="text-3xl font-bold leading-none">---m</span>
                <span class="text-xs font-bold opacity-60 uppercase tracking-widest pb-1">先を</span>
            </div>
            <p id="nav-instruction" class="text-xl font-bold leading-tight">目的地を設定してください</p>
        </div>
        <button onclick="stopNavigation()" class="p-3 opacity-30 hover:opacity-100 transition-opacity">
            <i data-lucide="x-circle" size="32"></i>
        </button>
    </div>

    <!-- GPS起動オーバーレイ -->
    <div id="geo-overlay" class="fixed inset-0 z-[2000] bg-midnight flex flex-col items-center justify-center p-8 text-white text-center">
        <div class="mb-8 relative">
            <i data-lucide="navigation" class="w-20 h-20 text-moon animate-pulse"></i>
            <div class="absolute -bottom-2 -right-2 bg-white rounded-full p-2 text-midnight">
                <i data-lucide="search" class="w-5 h-5"></i>
            </div>
        </div>
        <h2 class="text-3xl font-bold mb-4">直感ナビを起動中...</h2>
        <p class="text-white/60 mb-10 text-lg">位置情報とセンサーを許可してください！</p>
        <button id="retry-btn" class="hidden px-12 py-5 bg-moon text-midnight rounded-full font-bold text-xl shadow-2xl active:scale-95 transition-transform">
            再試行する
        </button>
    </div>

    <!-- ヘッダー -->
    <header class="p-6 flex justify-between items-center sticky top-0 z-50 backdrop-blur-xl border-b border-black/5 transition-colors">
        <div class="flex items-center gap-3">
            <div id="header-icon" class="w-10 h-10 bg-accent/10 rounded-xl flex items-center justify-center text-accent">
                <i data-lucide="compass"></i>
            </div>
            <div>
                <h1 class="text-xl font-bold tracking-tight leading-none">さんぽパレット</h1>
                <p id="season-label" class="text-[10px] uppercase tracking-[0.2em] opacity-40 mt-1">Loading Season...</p>
            </div>
            <div id="midnight-cat" class="hidden text-moon ml-2 animate-bounce">
                <i data-lucide="cat" size="24"></i>
            </div>
        </div>
        <div class="flex items-center gap-2">
            <button onclick="getLocation()" class="p-3 rounded-full hover:bg-black/5 transition-colors">
                <i data-lucide="refresh-cw" size="22" class="opacity-50"></i>
            </button>
            <button id="skull-btn" class="p-3 rounded-full bg-gray-100 text-gray-400 hover:bg-red-100 hover:text-red-500 transition-all">
                <i data-lucide="skull" size="22"></i>
            </button>
            <button onclick="toggleMidnight()" class="p-4 rounded-full bg-secondary text-white shadow-lg hover:scale-110 active:scale-90 transition-all" id="mode-btn">
                <i data-lucide="moon" size="22"></i>
            </button>
        </div>
    </header>

    <main class="max-w-2xl mx-auto px-6 pt-4">
        
        <!-- タブ: プランナー -->
        <section id="tab-planner" class="tab-content active space-y-8">
            
            <!-- 時間選択セクション -->
            <div class="p-8 rounded-[3rem] bg-white shadow-sm card-bg" id="time-card">
                <div class="flex items-center justify-between mb-8">
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 rounded-2xl bg-secondary/10 text-secondary flex items-center justify-center">
                            <i data-lucide="clock"></i>
                        </div>
                        <h2 class="text-xl font-bold">予定時間</h2>
                    </div>
                    <div class="text-right">
                        <span class="text-3xl font-bold text-secondary" id="time-display">30分</span>
                    </div>
                </div>
                <input type="range" min="30" max="120" step="15" value="30" id="time-range" class="w-full cursor-pointer">
                <div class="flex justify-between mt-4 text-[11px] font-bold opacity-30 uppercase tracking-[0.2em]">
                    <span>30 min</span>
                    <span>120 min</span>
                </div>
            </div>

            <!-- 地図セクション -->
            <div id="map-wrapper">
                <div id="map"></div>
                <!-- 中心マーカー (自車位置) -->
                <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 z-[500] pointer-events-none">
                    <div class="relative">
                        <div class="w-10 h-10 bg-blue-500/20 rounded-full animate-ping absolute inset-0"></div>
                        <div class="w-10 h-10 bg-blue-500 rounded-full border-4 border-white shadow-2xl flex items-center justify-center relative">
                            <i data-lucide="navigation" class="text-white w-5 h-5"></i>
                        </div>
                    </div>
                </div>
            </div>

            <!-- コース提案セクション -->
            <div class="p-10 rounded-[3rem] bg-white shadow-sm card-bg" id="planner-card">
                <div id="route-info" class="space-y-8">
                    <div class="flex justify-between items-start gap-4">
                        <div class="space-y-2">
                            <h4 class="text-3xl font-bold leading-tight tracking-tight" id="route-name">現在地を取得中...</h4>
                            <p class="text-base opacity-60 font-medium" id="route-meta">近くのスポットを探しています</p>
                            <div id="safety-badge" class="hidden inline-flex items-center gap-1 px-3 py-1 rounded-full bg-moon/20 text-moon text-[10px] font-bold uppercase tracking-widest">
                                <i data-lucide="shield-check" size="12"></i>
                                Safety Route Active
                            </div>
                        </div>
                        <button onclick="startFullRoute()" class="w-20 h-20 rounded-[2rem] bg-secondary text-white shadow-2xl hover:scale-105 active:scale-95 transition-all flex items-center justify-center" id="start-route-btn">
                            <i data-lucide="play" size="36" class="fill-current ml-1"></i>
                        </button>
                    </div>
                    
                    <div class="space-y-6 relative">
                        <div class="absolute left-7 top-6 bottom-6 w-1 bg-secondary/10 rounded-full"></div>
                        <div id="route-list" class="space-y-8"></div>
                    </div>
                </div>
            </div>
        </section>

        <!-- タブ: ラリー -->
        <section id="tab-rally" class="tab-content space-y-6">
            <div class="flex items-center justify-between mb-2">
                <h2 class="text-2xl font-bold">スタンプラリー</h2>
                <div class="flex items-center gap-2 px-5 py-2 rounded-full bg-secondary/10 text-secondary font-bold">
                    <i data-lucide="award" size="18"></i>
                    <span id="rally-count">0 達成</span>
                </div>
            </div>

            <div id="custom-route-start-box" class="hidden p-6 rounded-[2.5rem] bg-secondary text-white shadow-xl flex items-center justify-between animate-bounce">
                <div>
                    <p class="text-xs font-bold uppercase tracking-widest opacity-80">カスタムルート作成中</p>
                    <p class="text-lg font-bold" id="custom-route-summary">0スポット 選択中</p>
                </div>
                <button onclick="switchTab('planner'); startFullRoute();" class="px-8 py-4 bg-white text-secondary rounded-2xl font-bold shadow-lg active:scale-95 transition-all flex items-center gap-2">
                    <i data-lucide="play" size="18" class="fill-current"></i>
                    出発
                </button>
            </div>

            <div id="poi-list" class="space-y-4"></div>
        </section>

        <!-- タブ: マイページ (称号 & 黒猫) -->
        <section id="tab-trophy" class="tab-content space-y-8">
            <!-- 黒猫親密度カード -->
            <div class="p-8 rounded-[3rem] bg-white shadow-sm card-bg space-y-6">
                <div class="flex items-center gap-6">
                    <div class="w-24 h-24 rounded-full bg-midnight flex items-center justify-center relative border-4 border-accent/20">
                        <i data-lucide="cat" size="48" class="text-white" id="cat-status-icon"></i>
                        <div id="cat-heart" class="hidden absolute -top-2 -right-2 text-red-500 heart-pop">
                            <i data-lucide="heart" class="fill-current"></i>
                        </div>
                    </div>
                    <div class="flex-1">
                        <h3 class="text-2xl font-bold" id="cat-level-name">黒猫の影</h3>
                        <p class="text-sm opacity-60" id="cat-level-desc">まだ遠くから見守っています...</p>
                    </div>
                </div>
                <div class="space-y-2">
                    <div class="flex justify-between text-xs font-bold uppercase tracking-widest opacity-40">
                        <span>親密度 (累計距離)</span>
                        <span id="total-dist-display">0.0 km</span>
                    </div>
                    <div class="gauge-container">
                        <div id="cat-gauge" class="gauge-fill" style="width: 0%"></div>
                    </div>
                </div>
            </div>

            <!-- 季節の称号 -->
            <div class="p-8 rounded-[3rem] bg-white shadow-sm card-bg space-y-6">
                <h3 class="text-xl font-bold flex items-center gap-2">
                    <i data-lucide="sparkles" class="text-accent"></i>
                    季節の限定称号
                </h3>
                <div class="grid grid-cols-1 gap-4" id="seasonal-titles-list">
                    <!-- 称号がここに並ぶ -->
                </div>
            </div>
        </section>
    </main>

    <!-- ボトムナビ -->
    <nav id="bottom-nav" class="fixed bottom-0 left-0 right-0 p-6 border-t bg-white/90 backdrop-blur-2xl z-[100] card-bg">
        <div class="max-w-2xl mx-auto flex justify-around items-center">
            <button onclick="switchTab('planner')" class="nav-btn flex flex-col items-center gap-2 text-secondary nav-active transition-all" id="btn-planner">
                <div class="w-14 h-10 rounded-2xl flex items-center justify-center bg-secondary/10" id="nav-icon-bg-planner">
                    <i data-lucide="navigation" size="26"></i>
                </div>
                <span class="text-[11px] font-bold tracking-wider">プラン</span>
            </button>
            <button onclick="switchTab('rally')" class="nav-btn flex flex-col items-center gap-2 opacity-40 transition-all" id="btn-rally">
                <div class="w-14 h-10 rounded-2xl flex items-center justify-center" id="nav-icon-bg-rally">
                    <i data-lucide="map-pin" size="26"></i>
                </div>
                <span class="text-[11px] font-bold tracking-wider">ラリー</span>
            </button>
            <button onclick="switchTab('trophy')" class="nav-btn flex flex-col items-center gap-2 opacity-40 transition-all" id="btn-trophy">
                <div class="w-14 h-10 rounded-2xl flex items-center justify-center" id="nav-icon-bg-trophy">
                    <i data-lucide="cat" size="26"></i>
                </div>
                <span class="text-[11px] font-bold tracking-wider">マイページ</span>
            </button>
        </div>
    </nav>

    <script>
        // --- State ---
        let state = {
            isMidnight: false,
            isCollapse: false,
            activeTab: 'planner',
            plannedTime: 30,
            userLocation: null,
            startLocation: null,
            heading: 0,
            pois: [],
            selectedCustomPois: [],
            isCustomRoute: false,
            stamps: JSON.parse(localStorage.getItem('sanpo-stamps') || '[]'),
            totalDistance: parseFloat(localStorage.getItem('sanpo-total-dist') || '0'),
            seasonalStats: JSON.parse(localStorage.getItem('sanpo-seasonal') || '{"spring":0,"summer":0,"autumn":0,"winter":0}'),
            map: null,
            routeLine: null,
            isNavigating: false,
            suggestedRoute: [],
            currentStepIndex: 0,
            lastAnnouncedStep: -1,
            currentRouteSteps: [],
            poiMarkers: [],
            catMarker: null,
            lastLocation: null,
            lastActivity: Date.now()
        };

        const SEASONS = [
            { id: 'winter', name: '冬', label: 'Winter', months: [11, 0, 1], colors: { p: '#A5F2F3', s: '#FFFFFF' }, title: '寒月を仰ぐ歩き手' },
            { id: 'spring', name: '春', label: 'Spring', months: [2, 3, 4], colors: { p: '#FFB7C5', s: '#87A96B' }, title: '春の息吹を辿る者' },
            { id: 'summer', name: '夏', label: 'Summer', months: [5, 6, 7], colors: { p: '#00BFFF', s: '#FFD700' }, title: '陽炎を往く探索者' },
            { id: 'autumn', name: '秋', label: 'Autumn', months: [8, 9, 10], colors: { p: '#D35400', s: '#F39C12' }, title: '錦秋の旅人' }
        ];

        const CATEGORY_LABELS = { shrine: '神社・寺院', park: '公園', historic: '史跡', other: 'スポット' };
        const WALKING_SPEED_KMH = 4.5;

        // --- Initialization ---
        function init() {
            applySeasonalUI();
            lucide.createIcons();
            initMap();
            getLocation();
            setupOrientation();
            setupCollapseTrigger();
            
            const timeRange = document.getElementById('time-range');
            if (timeRange) {
                timeRange.addEventListener('input', (e) => {
                    state.plannedTime = parseInt(e.target.value);
                    const display = document.getElementById('time-display');
                    if (display) display.innerText = `${state.plannedTime}分`;
                    state.isCustomRoute = false;
                    state.selectedCustomPois = [];
                    calculateRoute();
                    updateUI();
                });
            }
            
            const retryBtn = document.getElementById('retry-btn');
            if (retryBtn) retryBtn.onclick = getLocation;
        }

        function applySeasonalUI() {
            const month = new Date().getMonth();
            const season = SEASONS.find(s => s.months.includes(month));
            
            document.documentElement.style.setProperty('--primary', season.colors.p);
            document.documentElement.style.setProperty('--secondary', season.colors.s);
            const label = document.getElementById('season-label');
            if (label) label.innerText = `Sanpo Palette | ${season.label}`;
        }

        function initMap() {
            state.map = L.map('map', { 
                zoomControl: false, 
                attributionControl: false, 
                dragging: true,
                touchZoom: true, 
                scrollWheelZoom: true 
            }).setView([35.6895, 139.6917], 17);
            
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(state.map);
        }

        function setupOrientation() {
            if (window.DeviceOrientationEvent) {
                window.addEventListener('deviceorientation', (e) => {
                    let heading = e.webkitCompassHeading || (e.alpha ? 360 - e.alpha : 0);
                    state.heading = heading;
                    updateMapRotation();
                });
            }
        }

        function updateMapRotation() {
            const mapEl = document.getElementById('map');
            if (mapEl && state.isNavigating) {
                mapEl.style.transform = `rotate(${-state.heading}deg)`;
            } else if (mapEl) {
                mapEl.style.transform = `none`;
            }
        }

        function getLocation() {
            const overlay = document.getElementById('geo-overlay');
            const retryBtn = document.getElementById('retry-btn');

            navigator.geolocation.watchPosition(pos => {
                const current = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                
                if (state.isNavigating && state.lastLocation) {
                    const d = getDistance(state.lastLocation.lat, state.lastLocation.lng, current.lat, current.lng);
                    if (d > 0.005) {
                        state.totalDistance += d;
                        localStorage.setItem('sanpo-total-dist', state.totalDistance.toFixed(3));
                        state.lastLocation = current;
                        state.lastActivity = Date.now();
                    }
                } else {
                    state.lastLocation = current;
                }

                state.userLocation = current;
                if (!state.startLocation) state.startLocation = state.userLocation;
                
                if (overlay) overlay.classList.add('hidden');
                if (state.isNavigating) {
                    if (state.map) state.map.setView([state.userLocation.lat, state.userLocation.lng]);
                    updateNavigation();
                    
                    if (state.isCollapse && Date.now() - state.lastActivity > 60000) {
                        alert("システムが破損しました。活動を再開してください。");
                        location.reload();
                    }
                } else if (state.pois.length === 0) {
                    if (state.map) state.map.setView([state.userLocation.lat, state.userLocation.lng]);
                }
                
                if (state.pois.length === 0) fetchPOIs();
                updateCatMarker();
            }, err => {
                if (retryBtn) retryBtn.classList.remove('hidden');
            }, { enableHighAccuracy: true });
        }

        function updateCatMarker() {
            if (!state.map || !state.userLocation) return;
            
            const level = getCatLevel();
            
            if (level === 3) {
                const catPos = [state.userLocation.lat + 0.0001, state.userLocation.lng + 0.0001];
                if (!state.catMarker) {
                    const catIcon = L.divIcon({
                        className: 'cat-marker',
                        html: '<div class="relative"><i data-lucide="cat" class="text-midnight fill-current"></i><div class="absolute -top-4 -right-2 text-red-500 heart-pop"><i data-lucide="heart" size="12" class="fill-current"></i></div></div>',
                        iconSize: [24, 24]
                    });
                    state.catMarker = L.marker(catPos, { icon: catIcon }).addTo(state.map);
                    lucide.createIcons();
                } else {
                    state.catMarker.setLatLng(catPos);
                }
            } else if (state.catMarker) {
                state.map.removeLayer(state.catMarker);
                state.catMarker = null;
            }
        }

        function getCatLevel() {
            if (state.totalDistance >= 15) return 3;
            if (state.totalDistance >= 5) return 2;
            return 1;
        }

        async function fetchPOIs() {
            const { lat, lng } = state.startLocation || state.userLocation;
            const query = `[out:json][timeout:25];(node["amenity"="place_of_worship"](around:2500,${lat},${lng});node["leisure"="park"](around:2500,${lat},${lng});node["historic"](around:2500,${lat},${lng}););out center;`;
            try {
                const res = await fetch(`https://overpass-api.de/api/interpreter?data=${encodeURIComponent(query)}`);
                const data = await res.json();
                state.pois = data.elements.filter(el => el.tags && el.tags.name).map(el => ({
                    id: el.id, 
                    name: el.tags.name, 
                    lat: el.lat || el.center.lat, 
                    lng: el.lon || el.center.lon,
                    category: el.tags.amenity === 'place_of_worship' ? 'shrine' : el.tags.leisure === 'park' ? 'park' : 'historic',
                    distance: getDistance(lat, lng, el.lat || el.center.lat, el.lon || el.center.lon)
                })).sort((a, b) => a.distance - b.distance);
                
                calculateRoute();
                updateUI();
            } catch (e) { console.error(e); }
        }

        function calculateRoute() {
            if (state.pois.length === 0 || !state.startLocation) return;
            let loopPois = [];
            let estimatedTime = state.plannedTime;

            if (state.isCollapse) {
                loopPois = [
                    { lat: state.startLocation.lat + 0.006, lng: state.startLocation.lng + 0.004, name: "廃墟の記憶 (Scavenge)", category: "historic", id: "collapse-1" },
                    { lat: state.startLocation.lat - 0.004, lng: state.startLocation.lng + 0.009, name: "白猫の祭壇", category: "shrine", id: "collapse-2" }
                ];
                estimatedTime = 45;
            } else if (state.isCustomRoute && state.selectedCustomPois.length > 0) {
                loopPois = state.pois.filter(p => state.selectedCustomPois.includes(p.id));
                loopPois.sort((a, b) => a.distance - b.distance);
                let totalDist = 0;
                let prev = state.startLocation;
                loopPois.forEach(p => {
                    totalDist += getDistance(prev.lat, prev.lng, p.lat, p.lng);
                    prev = p;
                });
                totalDist += getDistance(prev.lat, prev.lng, state.startLocation.lat, state.startLocation.lng);
                estimatedTime = Math.round((totalDist / WALKING_SPEED_KMH) * 60 + (loopPois.length * 10));
                state.plannedTime = estimatedTime;
            } else {
                const totalDistanceKm = (state.plannedTime / 60) * WALKING_SPEED_KMH;
                const targetRadius = totalDistanceKm / 3.5;
                let candidates = state.pois.filter(p => p.distance <= targetRadius);
                let count = Math.min(Math.max(Math.floor(state.plannedTime / 30) + 1, 2), 4);
                if (candidates.length > 0) {
                    loopPois.push(candidates[0]);
                    for (let i = 1; i < count; i++) {
                        let bestNext = null;
                        let maxDistFromLast = -1;
                        candidates.forEach(c => {
                            if (loopPois.includes(c)) return;
                            let d = getDistance(loopPois[loopPois.length-1].lat, loopPois[loopPois.length-1].lng, c.lat, c.lng);
                            if (d > maxDistFromLast) { maxDistFromLast = d; bestNext = c; }
                        });
                        if (bestNext) loopPois.push(bestNext);
                    }
                }
            }
            state.suggestedRoute = [...loopPois, { ...state.startLocation, name: "スタート地点 (ゴール)", isGoal: true }];
            if (state.poiMarkers) state.poiMarkers.forEach(m => state.map.removeLayer(m));
            state.poiMarkers = state.suggestedRoute.map((p, i) => {
                const color = p.isGoal ? '#3b82f6' : (state.isMidnight ? '#F4D03F' : (state.isCollapse ? '#FF4500' : 'var(--secondary)'));
                return L.circleMarker([p.lat, p.lng], { radius: 10, fillColor: color, color: '#fff', weight: 3, fillOpacity: 0.9 }).addTo(state.map).bindPopup(`<b>${i+1}. ${p.name}</b>`);
            });
        }

        async function startFullRoute() {
            if (state.suggestedRoute.length === 0) return;
            state.isNavigating = true;
            state.currentStepIndex = 0;
            state.lastAnnouncedStep = -1;
            state.lastActivity = Date.now();
            await fetchNextLeg();
            const card = document.getElementById('nav-step-card');
            if (card) card.classList.add('visible');
            updateUI();
            const modeText = state.isCollapse ? "システム崩壊モードで" : (state.isMidnight ? "安全な大通り優先ルートで" : "景色の良いルートで");
            speak(`${state.isCustomRoute ? "カスタム" : "おすすめ"}ルートを開始します。${modeText}、${state.suggestedRoute[0].name}へのナビを開始します！`);
        }

        async function fetchNextLeg() {
            const start = state.currentStepIndex === 0 ? state.userLocation : state.suggestedRoute[state.currentStepIndex - 1];
            const end = state.suggestedRoute[state.currentStepIndex];
            const profile = (state.isMidnight || state.isCollapse) ? 'driving' : 'walking';
            const url = `https://router.project-osrm.org/route/v1/${profile}/${start.lng},${start.lat};${end.lng},${end.lat}?overview=full&geometries=geojson&steps=true`;
            try {
                const res = await fetch(url);
                const data = await res.json();
                const route = data.routes[0];
                if (state.routeLine) state.map.removeLayer(state.routeLine);
                const color = state.isCollapse ? '#FF4500' : (state.isMidnight ? '#F4D03F' : '#3b82f6');
                state.routeLine = L.geoJSON(route.geometry, { style: { color: color, weight: 12, opacity: 0.8 } }).addTo(state.map);
                state.currentRouteSteps = route.legs[0].steps;
            } catch (e) { console.error(e); }
        }

        function updateNavigation() {
            if (!state.currentRouteSteps || state.currentRouteSteps.length === 0) return;
            const nextStep = state.currentRouteSteps[0];
            const stepCoord = { lat: nextStep.maneuver.location[1], lng: nextStep.maneuver.location[0] };
            const dist = Math.round(getDistance(state.userLocation.lat, state.userLocation.lng, stepCoord.lat, stepCoord.lng) * 1000);
            if (dist > 150 && state.currentRouteSteps.length > 0) {
                speak("ルートから外れました。再検索しています。");
                fetchNextLeg();
                return;
            }
            const distEl = document.getElementById('nav-dist');
            if (distEl) distEl.innerText = `${dist}m`;
            let instruction = nextStep.maneuver.type === 'arrive' ? "まもなく目的地です" : `${nextStep.name || '道'}を${translateManeuver(nextStep.maneuver.modifier)}`;
            const instEl = document.getElementById('nav-instruction');
            if (instEl) instEl.innerText = instruction;
            updateNavIcon(nextStep.maneuver.modifier);
            const stepId = nextStep.maneuver.location.toString();
            if (dist < 15 && state.lastAnnouncedStep !== stepId) {
                speak(`まもなく${instruction}です！`);
                state.lastAnnouncedStep = stepId;
                state.currentRouteSteps.shift();
                if (nextStep.maneuver.type === 'arrive') handleArrive();
            }
        }

        async function handleArrive() {
            const arrivedPoi = state.suggestedRoute[state.currentStepIndex];
            speak(`${arrivedPoi.name}に到着しました！`);
            
            if (getCatLevel() >= 2) speak("ニャー！");

            if (!arrivedPoi.isGoal && !state.stamps.includes(arrivedPoi.id)) {
                toggleStamp(arrivedPoi.id);
                const month = new Date().getMonth();
                const season = SEASONS.find(s => s.months.includes(month));
                state.seasonalStats[season.id]++;
                localStorage.setItem('sanpo-seasonal', JSON.stringify(state.seasonalStats));
            }

            if (state.currentStepIndex < state.suggestedRoute.length - 1) {
                state.currentStepIndex++;
                speak(`次は${state.suggestedRoute[state.currentStepIndex].name}に向かいます。`);
                await fetchNextLeg();
            } else {
                speak("お疲れ様でした！スタート地点に戻りました。");
                stopNavigation();
            }
        }

        function toggleCustomPoi(id) {
            if (state.selectedCustomPois.includes(id)) {
                state.selectedCustomPois = state.selectedCustomPois.filter(sid => sid !== id);
            } else {
                state.selectedCustomPois.push(id);
            }
            state.isCustomRoute = state.selectedCustomPois.length > 0;
            calculateRoute();
            updateUI();
        }

        function translateManeuver(mod) {
            const dict = { left: '左折', right: '右折', 'slight left': '左方向', 'slight right': '右方向', straight: '直進' };
            return dict[mod] || '進みます';
        }

        function updateNavIcon(mod) {
            const icon = document.getElementById('nav-arrow-icon');
            if (icon) {
                const icons = { left: 'arrow-up-left', right: 'arrow-up-right', straight: 'arrow-up' };
                icon.setAttribute('data-lucide', icons[mod] || 'arrow-up');
                lucide.createIcons();
            }
        }

        function stopNavigation() {
            state.isNavigating = false;
            const card = document.getElementById('nav-step-card');
            if (card) card.classList.remove('visible');
            if (state.routeLine && state.map) state.map.removeLayer(state.routeLine);
            updateUI();
        }

        function updateUI() {
            const body = document.body;
            const card = document.getElementById('nav-step-card');
            const arrowBox = document.getElementById('nav-arrow-box');
            const modeBtn = document.getElementById('mode-btn');
            const midnightCat = document.getElementById('midnight-cat');
            const safetyBadge = document.getElementById('safety-badge');
            const headerIcon = document.getElementById('header-icon');
            const skullBtn = document.getElementById('skull-btn');

            if (!body) return;

            body.classList.remove('midnight-mode', 'collapse-mode');
            if (card) card.classList.remove('midnight-mode', 'collapse-mode');
            if (headerIcon) headerIcon.classList.remove('glitch', 'text-red-500');

            if (state.isCollapse) {
                body.classList.add('collapse-mode');
                if (card) card.classList.add('collapse-mode');
                if (headerIcon) headerIcon.classList.add('glitch', 'text-red-500');
                if (skullBtn) skullBtn.classList.replace('text-gray-400', 'text-red-500');
                if (arrowBox) {
                    arrowBox.classList.replace('bg-secondary', 'bg-accent');
                    arrowBox.classList.replace('bg-moon', 'bg-accent');
                }
            } else if (state.isMidnight) {
                body.classList.add('midnight-mode');
                if (midnightCat) midnightCat.classList.remove('hidden');
                if (safetyBadge) safetyBadge.classList.remove('hidden');
                if (card) card.classList.add('midnight-mode');
                if (arrowBox) {
                    arrowBox.classList.replace('bg-secondary', 'bg-moon');
                    arrowBox.classList.replace('text-white', 'text-midnight');
                }
                if (modeBtn) {
                    modeBtn.classList.replace('bg-secondary', 'bg-moon');
                    modeBtn.classList.replace('text-white', 'text-midnight');
                    modeBtn.innerHTML = '<i data-lucide="sun" size="22"></i>';
                }
                if (skullBtn) skullBtn.classList.replace('text-red-500', 'text-gray-400');
            } else {
                if (midnightCat) midnightCat.classList.add('hidden');
                if (safetyBadge) safetyBadge.classList.add('hidden');
                if (arrowBox) {
                    arrowBox.classList.replace('bg-moon', 'bg-secondary');
                    arrowBox.classList.replace('text-midnight', 'text-white');
                }
                if (modeBtn) {
                    modeBtn.classList.replace('bg-moon', 'bg-secondary');
                    modeBtn.classList.replace('text-midnight', 'text-white');
                    modeBtn.innerHTML = '<i data-lucide="moon" size="22"></i>';
                }
                if (skullBtn) skullBtn.classList.replace('text-red-500', 'text-gray-400');
            }

            // Route List
            const routeList = document.getElementById('route-list');
            if (routeList) {
                routeList.innerHTML = '';
                state.suggestedRoute.forEach((p, i) => {
                    const div = document.createElement('div');
                    div.className = `p-6 rounded-[2rem] flex items-center gap-5 card-bg relative z-10 ${state.isMidnight ? 'bg-navy-card' : (state.isCollapse ? 'bg-[#3D2B2B]' : 'bg-gray-50')}`;
                    div.innerHTML = `
                        <div class="w-14 h-14 rounded-2xl flex items-center justify-center bg-secondary/10 text-secondary font-bold text-xl">${i+1}</div>
                        <div class="flex-1">
                            <h5 class="font-bold text-xl">${p.name}</h5>
                            <p class="text-xs opacity-50 font-bold uppercase tracking-widest">${p.isGoal ? 'ゴール' : CATEGORY_LABELS[p.category]}</p>
                        </div>
                    `;
                    routeList.appendChild(div);
                });
            }

            const routeName = document.getElementById('route-name');
            const routeMeta = document.getElementById('route-meta');
            if (state.suggestedRoute.length > 0) {
                const routeTitle = state.isCollapse ? "システム崩壊ルート" : (state.isCustomRoute ? "カスタム周回コース" : `${state.plannedTime}分の周回コース`);
                if (routeName) routeName.innerText = routeTitle;
                if (routeMeta) routeMeta.innerText = `${state.suggestedRoute.length - 1}箇所のスポットを巡って戻ります (約${state.plannedTime}分)`;
            }

            // Rally List
            const poiList = document.getElementById('poi-list');
            const customRouteBox = document.getElementById('custom-route-start-box');
            const customRouteSummary = document.getElementById('custom-route-summary');
            if (poiList) {
                poiList.innerHTML = '';
                if (state.selectedCustomPois.length > 0) {
                    if (customRouteBox) customRouteBox.classList.remove('hidden');
                    if (customRouteSummary) customRouteSummary.innerText = `${state.selectedCustomPois.length}スポット 選択中 (約${state.plannedTime}分)`;
                } else if (customRouteBox) {
                    customRouteBox.classList.add('hidden');
                }

                state.pois.forEach(p => {
                    const isStamped = state.stamps.includes(p.id);
                    const isSelected = state.selectedCustomPois.includes(p.id);
                    const div = document.createElement('div');
                    div.className = `p-6 rounded-[2.5rem] flex justify-between items-center card-bg transition-all cursor-pointer ${state.isMidnight ? 'bg-navy-card' : (state.isCollapse ? 'bg-[#3D2B2B]' : 'bg-white')} ${isSelected ? 'ring-4 ring-secondary' : ''}`;
                    div.onclick = () => toggleCustomPoi(p.id);
                    div.innerHTML = `
                        <div class="flex items-center gap-5">
                            <div class="w-16 h-16 rounded-3xl flex items-center justify-center ${isStamped ? 'bg-secondary text-white shadow-lg shadow-secondary/20' : 'bg-gray-100 text-gray-400'}">
                                <i data-lucide="${isStamped ? 'check' : 'map-pin'}" size="28"></i>
                            </div>
                            <div>
                                <h4 class="font-bold text-xl">${p.name}</h4>
                                <p class="text-xs opacity-50 font-bold uppercase tracking-widest">${p.distance.toFixed(2)}km</p>
                            </div>
                        </div>
                        <div class="flex flex-col items-end gap-2">
                            <span class="text-[10px] font-bold uppercase tracking-widest ${isSelected ? 'text-secondary' : 'opacity-30'}">${isSelected ? '選択中' : 'タップで選択'}</span>
                            <button onclick="event.stopPropagation(); toggleStamp(${p.id})" class="px-6 py-2 rounded-xl text-[10px] font-bold transition-all ${isStamped ? 'opacity-30' : 'bg-secondary text-white shadow-lg shadow-secondary/20 active:scale-95'}">${isStamped ? '済' : 'スタンプ'}</button>
                        </div>
                    `;
                    poiList.appendChild(div);
                });
            }
            const rallyCount = document.getElementById('rally-count');
            if (rallyCount) rallyCount.innerText = `${state.stamps.length} 達成`;

            // Cat Intimacy UI
            const level = getCatLevel();
            const levelNames = ["", "黒猫の影", "人懐っこい黒猫", "旅の相棒"];
            const levelDescs = ["", "まだ遠くから見守っています...", "時々足元に寄ってくるようになりました", "あなたの後ろをトコトコ付いてきます！"];
            const catNameEl = document.getElementById('cat-level-name');
            const catDescEl = document.getElementById('cat-level-desc');
            const totalDistEl = document.getElementById('total-dist-display');
            const catGaugeEl = document.getElementById('cat-gauge');
            const catHeartEl = document.getElementById('cat-heart');
            const catIconEl = document.getElementById('cat-status-icon');

            if (catNameEl) catNameEl.innerText = levelNames[level];
            if (catDescEl) catDescEl.innerText = levelDescs[level];
            if (totalDistEl) totalDistEl.innerText = `${state.totalDistance.toFixed(1)} km`;
            if (catGaugeEl) catGaugeEl.style.width = `${Math.min((state.totalDistance / 15) * 100, 100)}%`;
            if (catHeartEl) catHeartEl.classList.toggle('hidden', level < 3);
            if (catIconEl) catIconEl.className = `text-white ${level >= 2 ? 'animate-bounce' : ''}`;

            // Seasonal Titles
            const titlesList = document.getElementById('seasonal-titles-list');
            if (titlesList) {
                titlesList.innerHTML = '';
                SEASONS.forEach(s => {
                    const count = state.seasonalStats[s.id];
                    const isUnlocked = count >= 3;
                    const div = document.createElement('div');
                    div.className = `p-5 rounded-2xl flex items-center justify-between ${isUnlocked ? 'bg-accent/10 border-2 border-accent' : 'bg-gray-100 opacity-40'}`;
                    div.innerHTML = `
                        <div class="flex items-center gap-4">
                            <div class="w-10 h-10 rounded-full bg-white flex items-center justify-center text-accent">
                                <i data-lucide="${isUnlocked ? 'award' : 'lock'}"></i>
                            </div>
                            <div>
                                <p class="text-xs font-bold uppercase tracking-widest">${s.name}の称号</p>
                                <p class="text-sm font-bold">${isUnlocked ? s.title : '??? (3スポット訪問で解放)'}</p>
                            </div>
                        </div>
                        <div class="text-right">
                            <p class="text-[10px] font-bold opacity-40">${count}/3</p>
                        </div>
                    `;
                    titlesList.appendChild(div);
                });
            }

            lucide.createIcons();
        }

        function setupCollapseTrigger() {
            const skullBtn = document.getElementById('skull-btn');
            if (skullBtn) {
                let skullTimer;
                skullBtn.onmousedown = skullBtn.ontouchstart = () => {
                    skullTimer = setTimeout(() => enterCollapseMode(), 2000);
                };
                skullBtn.onmouseup = skullBtn.ontouchend = () => clearTimeout(skullTimer);
            }
        }

        function enterCollapseMode() {
            state.isCollapse = !state.isCollapse;
            if (state.isCollapse) {
                state.isMidnight = false;
                speak("システム崩壊。虚無の散歩を開始します。");
                state.isCustomRoute = false;
                state.selectedCustomPois = [];
                calculateRoute();
            } else {
                speak("システム復旧。");
                calculateRoute();
            }
            updateUI();
        }

        function switchTab(tab) {
            state.activeTab = tab;
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            const tabEl = document.getElementById(`tab-${tab}`);
            if (tabEl) tabEl.classList.add('active');
            
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.add('opacity-40'));
            const btnEl = document.getElementById(`btn-${tab}`);
            if (btnEl) btnEl.classList.remove('opacity-40');
            updateUI();
        }

        function toggleMidnight() { 
            state.isMidnight = !state.isMidnight; 
            if (state.isMidnight) state.isCollapse = false;
            updateUI(); 
            calculateRoute(); 
            if (state.isNavigating) fetchNextLeg(); 
        }

        function toggleStamp(id) {
            if (state.stamps.includes(id)) {
                state.stamps = state.stamps.filter(s => s !== id);
            } else {
                state.stamps.push(id);
            }
            localStorage.setItem('sanpo-stamps', JSON.stringify(state.stamps));
            updateUI();
        }

        function speak(text) {
            const u = new SpeechSynthesisUtterance(text);
            u.lang = 'ja-JP';
            window.speechSynthesis.cancel();
            window.speechSynthesis.speak(u);
        }

        function getDistance(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * (Math.PI / 180);
            const dLon = (lon2 - lon1) * (Math.PI / 180);
            const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) + Math.cos(lat1 * (Math.PI / 180)) * Math.cos(lat2 * (Math.PI / 180)) * Math.sin(dLon / 2) * Math.sin(dLon / 2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        }

        window.onload = init;
    </script>
</body>
</html>

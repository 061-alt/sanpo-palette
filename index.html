<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sanpo Palette - 散歩を彩るパレット</title>
    
    <!-- CDNs -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    
    <style>
        /* --- 視認性最優先のテーマ設定 --- */
        :root {
            --bg: #FFFFFF;
            --card: #FFFFFF;
            --text: #1A1A1A;
            --accent: #FF6B81; /* 鮮やかなサクラピンク */
            --accent-soft: rgba(255, 107, 129, 0.1);
            --nav-bg: rgba(255, 255, 255, 0.98);
            --border: rgba(0, 0, 0, 0.1);
        }

        .theme-midnight {
            --bg: #050714;
            --card: #121426;
            --text: #FFFFFF;
            --accent: #FFD700; /* 黄金色 */
            --accent-soft: rgba(255, 215, 0, 0.15);
            --nav-bg: rgba(18, 20, 38, 0.98);
            --border: rgba(255, 255, 255, 0.1);
        }

        .theme-collapse {
            --bg: #1A0F0F;
            --card: #2D1A1A;
            --text: #D4A373;
            --accent: #FF4500;
            --accent-soft: rgba(255, 69, 0, 0.2);
            --nav-bg: rgba(26, 15, 15, 0.98);
            --border: var(--accent);
        }

        body {
            font-family: 'Noto Sans JP', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            transition: all 0.4s ease;
            overflow: hidden;
            height: 100vh;
            margin: 0;
        }

        /* --- 地図の視認性向上 --- */
        #map-container {
            position: absolute;
            inset: 0;
            z-index: 1;
            transition: transform 0.8s cubic-bezier(0.2, 1, 0.3, 1);
        }
        #map { height: 100%; width: 100%; background: #f0f0f0; }

        /* 昼モードはフィルタなし、夜だけ反転 */
        .theme-midnight .leaflet-tile { filter: invert(100%) hue-rotate(180deg) brightness(0.7) contrast(1.2); }
        .theme-collapse .leaflet-tile { filter: sepia(1) brightness(0.8) contrast(1.2); }

        /* --- UI Components --- */
        .glass-panel {
            background: var(--card);
            border: 1px solid var(--border);
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            border-radius: 32px;
            color: var(--text);
        }

        .btn-main {
            background: var(--accent);
            color: #FFF;
            padding: 16px 32px;
            border-radius: 999px;
            font-weight: 900;
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
            transition: transform 0.2s;
        }
        .btn-main:active { transform: scale(0.95); }
        .theme-midnight .btn-main { color: #000; }

        .nav-button {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            opacity: 0.3;
            transition: all 0.3s;
        }
        .nav-button.active { opacity: 1; transform: translateY(-4px); color: var(--accent); }

        /* --- 特殊演出 --- */
        .loading-screen {
            position: fixed;
            inset: 0;
            background: #FFF;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .cat-float {
            position: fixed;
            pointer-events: none;
            z-index: 100;
            transition: all 1s ease-in-out;
            filter: drop-shadow(0 10px 10px rgba(0,0,0,0.3));
        }

        .panel-slide {
            transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            transform: translateY(120%);
        }
        .panel-show { transform: translateY(0); }

        .glitch { animation: glitch-anim 0.2s infinite; }
        @keyframes glitch-anim {
            0% { transform: translate(0); }
            50% { transform: translate(-2px, 2px); }
            100% { transform: translate(0); }
        }
    </style>
</head>
<body class="theme-spring">

    <!-- 起動画面 -->
    <div id="loading-screen" class="loading-screen">
        <div class="mb-10 relative">
            <i data-lucide="palette" class="w-24 h-24 text-[var(--accent)] animate-bounce"></i>
        </div>
        <h1 class="text-4xl font-black mb-4 tracking-tighter">SANPO PALETTE</h1>
        <p class="text-sm opacity-50 mb-12 font-bold">散歩を彩る、あなただけのパレット</p>
        
        <button id="btn-init" class="btn-main flex items-center gap-4 text-xl px-12 py-6">
            <i data-lucide="play" class="fill-current"></i>
            アプリを起動
        </button>
        <p id="status-text" class="mt-8 text-xs opacity-40 font-bold">位置情報とセンサーの許可が必要です</p>
    </div>

    <!-- ヘッダー -->
    <header class="fixed top-0 left-0 right-0 p-6 z-50 flex justify-between items-center pointer-events-none">
        <div class="glass-panel px-6 py-3 flex items-center gap-4 pointer-events-auto">
            <div id="mode-icon" class="w-10 h-10 rounded-full flex items-center justify-center bg-[var(--accent)] text-white shadow-lg">
                <i data-lucide="sun" size="22"></i>
            </div>
            <div>
                <p class="text-[10px] font-black uppercase tracking-widest opacity-40">Palette</p>
                <p class="text-sm font-black" id="mode-label">March Sakura</p>
            </div>
        </div>
        
        <div id="skull-trigger" class="w-14 h-14 glass-panel flex items-center justify-center pointer-events-auto cursor-pointer active:scale-90 transition-transform">
            <i data-lucide="skull" id="skull-icon" class="text-gray-300"></i>
        </div>
    </header>

    <!-- メインマップ -->
    <main class="relative w-full h-full">
        <div id="map-container">
            <div id="map"></div>
        </div>

        <!-- ナビゲーション表示 -->
        <div id="nav-card" class="fixed top-28 left-6 right-6 z-40 hidden">
            <div class="glass-panel p-6 flex items-center gap-6 shadow-2xl border-2 border-[var(--accent)]">
                <div id="nav-arrow" class="w-16 h-16 bg-[var(--accent-soft)] rounded-2xl flex items-center justify-center text-[var(--accent)]">
                    <i data-lucide="arrow-up" size="40"></i>
                </div>
                <div class="flex-1 overflow-hidden">
                    <p class="text-[10px] font-black uppercase opacity-40 tracking-widest">Next</p>
                    <p class="text-xl font-black truncate" id="target-name">目的地</p>
                    <p class="text-sm font-bold text-[var(--accent)]" id="dist-label">あと 0m</p>
                </div>
            </div>
        </div>

        <!-- 黒猫 (Intimacy Level 3以上で出現) -->
        <div id="cat-companion" class="cat-float hidden">
            <div class="relative">
                <i data-lucide="cat" class="text-black w-14 h-14"></i>
                <div id="cat-heart" class="absolute -top-4 -right-2 text-red-500 hidden">
                    <i data-lucide="heart" size="18" class="fill-current animate-ping"></i>
                </div>
            </div>
        </div>
    </main>

    <!-- UIパネル -->
    <div id="panel-container" class="fixed bottom-28 left-4 right-4 z-50 pointer-events-none">
        
        <!-- PLAN -->
        <div id="panel-plan" class="glass-panel p-8 panel-slide pointer-events-auto hidden">
            <h2 class="text-2xl font-black mb-8 flex items-center gap-3">
                <i data-lucide="map-pin" class="text-[var(--accent)]"></i> 散歩を計画
            </h2>
            <div class="space-y-8">
                <div>
                    <div class="flex justify-between mb-4">
                        <label class="text-xs font-black opacity-40 uppercase tracking-widest">歩く時間</label>
                        <span id="time-display" class="text-xl font-black text-[var(--accent)]">60 分</span>
                    </div>
                    <input type="range" id="time-input" min="15" max="120" step="15" value="60" class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-[var(--accent)]">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <button id="btn-auto-route" class="p-6 bg-black/5 rounded-3xl text-center active:scale-95 transition-transform">
                        <i data-lucide="refresh-cw" class="mx-auto mb-2 text-[var(--accent)]"></i>
                        <p class="text-xs font-black">おまかせ周回</p>
                    </button>
                    <button id="btn-rally-list" class="p-6 bg-black/5 rounded-3xl text-center active:scale-95 transition-transform">
                        <i data-lucide="list" class="mx-auto mb-2 text-gray-400"></i>
                        <p class="text-xs font-black">スポット選択</p>
                    </button>
                </div>
                <button id="btn-start-walk" class="w-full btn-main py-5 text-lg">散歩を開始する</button>
            </div>
        </div>

        <!-- RALLY -->
        <div id="panel-rally" class="glass-panel p-8 panel-slide pointer-events-auto hidden">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-2xl font-black">周辺スポット</h2>
                <button id="btn-close-rally" class="w-10 h-10 bg-black/5 rounded-full flex items-center justify-center"><i data-lucide="x" size="20"></i></button>
            </div>
            <div id="rally-items" class="space-y-4 max-h-[50vh] overflow-y-auto pr-2">
                <!-- スポットリスト -->
            </div>
        </div>

        <!-- TROPHIES -->
        <div id="panel-trophy" class="glass-panel p-8 panel-slide pointer-events-auto hidden">
            <h2 class="text-2xl font-black mb-8">コレクション</h2>
            <div class="grid grid-cols-2 gap-4 mb-8">
                <div class="p-6 bg-black/5 rounded-3xl text-center">
                    <p class="text-[10px] font-black opacity-40 uppercase mb-1">Distance</p>
                    <p class="text-2xl font-black font-mono" id="stat-dist">0.00 km</p>
                </div>
                <div class="p-6 bg-black/5 rounded-3xl text-center">
                    <p class="text-[10px] font-black opacity-40 uppercase mb-1">Intimacy</p>
                    <p class="text-2xl font-black font-mono" id="stat-cat">Lv. 1</p>
                </div>
            </div>
            <div id="trophy-list" class="flex flex-wrap gap-2">
                <!-- 称号 -->
            </div>
        </div>
    </div>

    <!-- 下部ナビ -->
    <nav class="fixed bottom-0 left-0 right-0 h-28 bg-[var(--nav-bg)] border-t border-black/5 z-50 flex justify-around items-center px-6 pb-4">
        <button id="nav-plan-btn" class="nav-button active">
            <i data-lucide="map"></i>
            <span class="text-[10px] font-black uppercase tracking-widest">Plan</span>
        </button>
        <button id="nav-rally-btn" class="nav-button">
            <i data-lucide="flag"></i>
            <span class="text-[10px] font-black uppercase tracking-widest">Rally</span>
        </button>
        <button id="nav-trophy-btn" class="nav-button">
            <i data-lucide="award"></i>
            <span class="text-[10px] font-black uppercase tracking-widest">Trophies</span>
        </button>
    </nav>

    <script>
        /* --- State --- */
        const state = {
            mode: 'spring',
            isWalking: false,
            pos: null,
            heading: 0,
            distance: 0,
            titles: [],
            route: [],
            step: 0,
            isInitialized: false
        };

        let map, userMarker, routePolyline;
        let skullTimer;

        /* --- Init --- */
        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            setupEvents();
            loadProgress();
        });

        function setupEvents() {
            document.getElementById('btn-init').onclick = initApp;
            document.getElementById('nav-plan-btn').onclick = () => showPanel('plan');
            document.getElementById('nav-rally-btn').onclick = () => showPanel('rally');
            document.getElementById('nav-trophy-btn').onclick = () => showPanel('trophy');
            document.getElementById('time-input').oninput = (e) => {
                document.getElementById('time-display').innerText = `${e.target.value} 分`;
            };
            document.getElementById('btn-auto-route').onclick = () => fetchSpots(true);
            document.getElementById('btn-rally-list').onclick = () => showPanel('rally');
            document.getElementById('btn-start-walk').onclick = startWalk;
            document.getElementById('btn-close-rally').onclick = () => showPanel('plan');

            const trigger = document.getElementById('skull-trigger');
            trigger.onmousedown = trigger.ontouchstart = () => {
                skullTimer = setTimeout(() => enterCollapseMode(), 2000);
            };
            trigger.onmouseup = trigger.ontouchend = () => clearTimeout(skullTimer);
        }

        async function initApp() {
            const status = document.getElementById('status-text');
            status.innerText = "位置情報を取得中...";

            try {
                const pos = await new Promise((res, rej) => {
                    navigator.geolocation.getCurrentPosition(res, rej, { enableHighAccuracy: true });
                });
                state.pos = [pos.coords.latitude, pos.coords.longitude];

                if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                    const permission = await DeviceOrientationEvent.requestPermission();
                    if (permission === 'granted') window.addEventListener('deviceorientation', handleOrientation);
                } else {
                    window.addEventListener('deviceorientation', handleOrientation);
                }

                setupMap();
                navigator.geolocation.watchPosition(updatePos, null, { enableHighAccuracy: true });

                document.getElementById('loading-screen').style.display = 'none';
                state.isInitialized = true;
                checkTimeTheme();
                showPanel('plan');
                speak("パレットを広げました。");
            } catch (err) {
                status.innerText = "位置情報を許可して再読み込みしてください";
            }
        }

        function setupMap() {
            map = L.map('map', { zoomControl: false, attributionControl: false }).setView(state.pos, 17);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            userMarker = L.circleMarker(state.pos, {
                radius: 12, fillColor: 'var(--accent)', fillOpacity: 1, color: 'white', weight: 4
            }).addTo(map);
        }

        /* --- Position & Heading --- */
        function updatePos(pos) {
            const newPos = [pos.coords.latitude, pos.coords.longitude];
            if (state.pos) {
                const d = getDist(state.pos, newPos);
                if (d > 2) {
                    state.distance += d / 1000;
                    state.pos = newPos;
                    userMarker.setLatLng(newPos);
                    if (!state.isWalking) map.panTo(newPos);
                    updateStats();
                }
            }
            if (state.isWalking) updateNav();
        }

        function handleOrientation(e) {
            let h = 0;
            if (e.webkitCompassHeading) h = e.webkitCompassHeading;
            else if (e.alpha) h = 360 - e.alpha;

            if (Math.abs(h - state.heading) > 5) { // 5度以上の変化で更新
                state.heading = h;
                if (state.isWalking) {
                    document.getElementById('map-container').style.transform = `rotate(${-h}deg)`;
                }
            }
        }

        /* --- Routing (周回モード) --- */
        async function fetchSpots(isAuto = false) {
            const time = parseInt(document.getElementById('time-input').value);
            const radius = (time / 60) * 1000; // 1時間で1km圏内
            
            speak("周辺スポットを探索中...");
            
            // Overpass API Query
            const query = `[out:json];node(around:${radius},${state.pos[0]},${state.pos[1]})["tourism"~"attraction|viewpoint|museum|gallery|park"];out 10;`;
            
            try {
                const res = await fetch(`https://overpass-api.de/api/interpreter?data=${encodeURIComponent(query)}`);
                const data = await res.json();
                
                if (!data.elements || data.elements.length === 0) {
                    // フォールバック: 現在地周辺にダミーポイントを作成して散歩を可能にする
                    if (isAuto) {
                        state.route = [
                            { lat: state.pos[0] + 0.003, lng: state.pos[1] + 0.002, name: "近くの広場" },
                            { lat: state.pos[0] - 0.002, lng: state.pos[1] + 0.004, name: "静かな通り" },
                            { lat: state.pos[0], lng: state.pos[1], name: "スタート地点" }
                        ];
                        alert("スポットが見つからなかったため、近隣の散歩コースを作成しました。");
                    } else {
                        alert("近くにスポットが見つかりませんでした。");
                    }
                } else {
                    if (isAuto) {
                        state.route = data.elements.slice(0, 3).map(e => ({
                            lat: e.lat, lng: e.lon, name: e.tags.name || "名もなき場所"
                        }));
                        state.route.push({ lat: state.pos[0], lng: state.pos[1], name: "スタート地点" });
                        alert("散歩ルートを作成しました！");
                    } else {
                        renderRally(data.elements);
                    }
                }
            } catch (err) {
                // 通信エラー時のフォールバック
                if (isAuto) {
                    state.route = [
                        { lat: state.pos[0] + 0.002, lng: state.pos[1] + 0.002, name: "未知のスポットA" },
                        { lat: state.pos[0], lng: state.pos[1], name: "スタート地点" }
                    ];
                    alert("オフライン用ルートを作成しました。");
                }
            }
        }

        function startWalk() {
            if (state.route.length === 0) return alert("プランを作成してください");
            state.isWalking = true;
            state.step = 0;
            showPanel(null);
            document.getElementById('nav-card').classList.remove('hidden');
            drawRoute();
            updateNav();
            speak("散歩を開始します。");
        }

        function updateNav() {
            if (!state.isWalking || !state.route[state.step]) return;
            const target = state.route[state.step];
            const d = getDist(state.pos, [target.lat, target.lng]);
            document.getElementById('target-name').innerText = target.name;
            document.getElementById('dist-label').innerText = `あと ${Math.round(d)}m`;
            const angle = getAngle(state.pos, [target.lat, target.lng]);
            document.getElementById('nav-arrow').style.transform = `rotate(${angle - state.heading}deg)`;
            if (d < 30) {
                speak(`${target.name}に到着。`);
                state.step++;
                if (state.step >= state.route.length) finishWalk();
                else updateNav();
            }
        }

        function finishWalk() {
            state.isWalking = false;
            document.getElementById('map-container').style.transform = `rotate(0deg)`;
            document.getElementById('nav-card').classList.add('hidden');
            if (routePolyline) map.removeLayer(routePolyline);
            speak("散歩完了。お疲れ様でした。");
            addTitle(state.mode === 'collapse' ? "虚無を越えし者" : "春のパレット職人");
            saveProgress();
            showPanel('trophy');
        }

        /* --- UI & Themes --- */
        function showPanel(id) {
            const panels = ['plan', 'rally', 'trophy'];
            panels.forEach(p => {
                const el = document.getElementById(`panel-${p}`);
                const btn = document.getElementById(`nav-${p}-btn`);
                if (p === id) {
                    el.classList.remove('hidden');
                    setTimeout(() => el.classList.add('panel-show'), 10);
                    btn.classList.add('active');
                } else {
                    el.classList.remove('panel-show');
                    setTimeout(() => el.classList.add('hidden'), 500);
                    btn.classList.remove('active');
                }
            });
        }

        function renderRally(elements) {
            const container = document.getElementById('rally-items');
            container.innerHTML = '';
            elements.forEach(e => {
                const name = e.tags.name || "名もなき場所";
                const d = Math.round(getDist(state.pos, [e.lat, e.lon]));
                const item = document.createElement('div');
                item.className = "p-5 bg-black/5 rounded-3xl flex justify-between items-center";
                item.innerHTML = `
                    <div><p class="font-black text-sm">${name}</p><p class="text-[10px] font-bold opacity-40">${d}m</p></div>
                    <button onclick="addToRoute(${e.lat}, ${e.lon}, '${name}')" class="text-[var(--accent)] font-black text-xs">+ 追加</button>
                `;
                container.appendChild(item);
            });
        }

        window.addToRoute = (lat, lng, name) => {
            state.route.push({ lat, lng, name });
            speak(`${name}を追加。`);
        };

        function checkTimeTheme() {
            const h = new Date().getHours();
            if (h >= 18 || h < 5) setTheme('midnight');
            else setTheme('spring');
        }

        function setTheme(mode) {
            state.mode = mode;
            document.body.className = `theme-${mode}`;
            const icon = document.getElementById('mode-icon');
            const label = document.getElementById('mode-label');
            const skull = document.getElementById('skull-icon');

            if (mode === 'midnight') {
                icon.innerHTML = '<i data-lucide="moon"></i>';
                label.innerText = 'Midnight Blue';
            } else if (mode === 'collapse') {
                icon.innerHTML = '<i data-lucide="skull"></i>';
                label.innerText = 'SYSTEM CORRUPTED';
                skull.classList.add('glitch', 'text-red-500');
            } else {
                icon.innerHTML = '<i data-lucide="sun"></i>';
                label.innerText = 'March Sakura';
                skull.classList.remove('glitch', 'text-red-500');
            }
            lucide.createIcons();
        }

        function enterCollapseMode() {
            setTheme('collapse');
            speak("システム崩壊。");
            state.route = [
                { lat: state.pos[0] + 0.005, lng: state.pos[1] + 0.005, name: "廃墟の記憶" },
                { lat: state.pos[0], lng: state.pos[1], name: "帰還ゲート" }
            ];
            startWalk();
        }

        /* --- Helpers --- */
        function getDist(p1, p2) {
            const R = 6371e3;
            const dLat = (p2[0]-p1[0]) * Math.PI/180;
            const dLon = (p2[1]-p1[1]) * Math.PI/180;
            const a = Math.sin(dLat/2)**2 + Math.cos(p1[0]*Math.PI/180)*Math.cos(p2[0]*Math.PI/180)*Math.sin(dLon/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        function getAngle(p1, p2) {
            const dy = p2[0] - p1[0];
            const dx = Math.cos(Math.PI/180 * p1[0]) * (p2[1] - p1[1]);
            return Math.atan2(dx, dy) * 180 / Math.PI;
        }

        function drawRoute() {
            if (routePolyline) map.removeLayer(routePolyline);
            const pts = [[state.pos[0], state.pos[1]], ...state.route.map(r => [r.lat, r.lng])];
            routePolyline = L.polyline(pts, { color: 'var(--accent)', weight: 8, opacity: 0.6, dashArray: '10, 15' }).addTo(map);
            map.fitBounds(routePolyline.getBounds(), { padding: [60, 60] });
        }

        function speak(text) {
            if (!window.speechSynthesis) return;
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'ja-JP';
            window.speechSynthesis.speak(msg);
        }

        function updateStats() {
            document.getElementById('stat-dist').innerText = `${state.distance.toFixed(2)} km`;
            const catLv = Math.floor(state.distance / 2) + 1; // 2kmごとにLvアップ
            document.getElementById('stat-cat').innerText = `Lv. ${catLv}`;
            
            // 黒猫の出現 (Lv.3以上)
            const cat = document.getElementById('cat-companion');
            if (catLv >= 3) {
                cat.classList.remove('hidden');
                cat.style.left = '50%';
                cat.style.top = '60%';
                document.getElementById('cat-heart').classList.remove('hidden');
            }

            const list = document.getElementById('trophy-list');
            list.innerHTML = '';
            state.titles.forEach(t => {
                const s = document.createElement('span');
                s.className = "px-4 py-1.5 bg-[var(--accent-soft)] text-[var(--accent)] rounded-full text-[10px] font-black border border-[var(--accent)]/20";
                s.innerText = t;
                list.appendChild(s);
            });
        }

        function addTitle(t) {
            if (!state.titles.includes(t)) {
                state.titles.push(t);
                speak(`称号「${t}」を獲得。`);
                updateStats();
            }
        }

        function saveProgress() {
            localStorage.setItem('sanpo_palette_v6', JSON.stringify({ distance: state.distance, titles: state.titles }));
        }

        function loadProgress() {
            const data = localStorage.getItem('sanpo_palette_v6');
            if (data) {
                const p = JSON.parse(data);
                state.distance = p.distance || 0;
                state.titles = p.titles || [];
                updateStats();
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>さんぽパレット | Sanpo Palette</title>
    
    <!-- CDNs -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --sage: #87A96B;
            --sand: #F5F5DC;
            --wood: #2D241E;
            --midnight: #02040A; /* 極限まで濃い紺 */
            --navy-card: #0A1023;
            --moon: #F4D03F;
        }
        body {
            font-family: 'Zen Maru Gothic', sans-serif;
            transition: background-color 0.5s, color 0.5s;
        }
        #map { height: 250px; border-radius: 1.5rem; z-index: 10; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        /* 深夜モードのスタイル強制上書き */
        .midnight-mode {
            background-color: var(--midnight) !important;
            color: #FFFFFF !important;
        }
        .midnight-mode .card-bg {
            background-color: var(--navy-card) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            color: #FFFFFF !important;
        }
        .midnight-mode .text-moon { color: var(--moon) !important; }
        .midnight-mode .text-white { color: #FFFFFF !important; }
        .midnight-mode .nav-active { color: var(--moon) !important; }
        
        /* スライダー */
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 24px; width: 24px; border-radius: 50%;
            background: var(--sage); cursor: pointer;
        }
        .midnight-mode input[type=range]::-webkit-slider-thumb {
            background: var(--moon);
        }
    </style>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        sage: '#87A96B',
                        sand: '#F5F5DC',
                        wood: '#2D241E',
                        midnight: '#02040A',
                        moon: '#F4D03F',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-sand text-wood pb-28 min-h-screen transition-all">

    <!-- GPS起動オーバーレイ -->
    <div id="geo-overlay" class="fixed inset-0 z-[200] bg-midnight flex flex-col items-center justify-center p-6 text-white text-center">
        <div class="mb-6"><i data-lucide="map-pin" class="w-16 h-16 text-moon animate-bounce"></i></div>
        <h2 class="text-2xl font-bold mb-2">現在地を探しています</h2>
        <p class="opacity-60 mb-8" id="geo-status">ブラウザの位置情報許可を確認してくださいっぴ！</p>
        <button id="retry-btn" class="hidden px-8 py-3 bg-moon text-midnight rounded-full font-bold">再試行する</button>
    </div>

    <!-- ヘッダー -->
    <header class="p-6 flex justify-between items-center sticky top-0 z-50 backdrop-blur-md">
        <div class="flex items-center gap-2">
            <div id="header-icon"><i data-lucide="map-pin" class="text-sage"></i></div>
            <h1 class="text-xl font-bold tracking-tight">さんぽパレット</h1>
            <div id="midnight-cat" class="hidden text-moon"><i data-lucide="cat"></i></div>
        </div>
        <button onclick="getLocation()" class="p-2 opacity-50 hover:opacity-100"><i data-lucide="refresh-cw" size="20"></i></button>
    </header>

    <main class="max-w-2xl mx-auto px-6">
        
        <!-- タブ: プラン -->
        <section id="tab-planner" class="tab-content active space-y-6">
            <div class="p-6 rounded-3xl bg-white shadow-sm card-bg" id="planner-card">
                <div class="flex items-center gap-2 mb-4">
                    <i data-lucide="clock" class="text-sage text-moon"></i>
                    <h2 class="text-lg font-bold">散歩プラン</h2>
                </div>
                <div class="space-y-4">
                    <div class="flex justify-between text-sm opacity-70">
                        <span>予定時間</span>
                        <span class="font-bold text-lg" id="time-display">30分</span>
                    </div>
                    <input type="range" min="15" max="120" step="15" value="30" id="time-range" class="w-full h-2 rounded-lg appearance-none bg-gray-200">
                </div>
            </div>

            <div id="map-container" class="relative">
                <div id="map"></div>
            </div>

            <div class="space-y-4">
                <h3 class="text-sm font-bold opacity-60 uppercase tracking-widest">おすすめのコース</h3>
                <div class="p-6 rounded-3xl bg-white shadow-sm card-bg">
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <h4 class="text-xl font-bold" id="route-name">周辺を巡るコース</h4>
                            <p class="text-sm opacity-60" id="route-meta">スポット取得中...</p>
                        </div>
                        <button onclick="toggleMidnight()" class="p-4 rounded-2xl bg-sage text-white shadow-lg transition-all" id="mode-btn">
                            <i data-lucide="moon" size="24"></i>
                        </button>
                    </div>
                    <div id="route-list" class="space-y-4">
                        <!-- コース内容 -->
                    </div>
                </div>
            </div>
        </section>

        <!-- タブ: ラリー -->
        <section id="tab-rally" class="tab-content space-y-6">
            <div class="flex items-center justify-between">
                <h2 class="text-xl font-bold">近くのスポット</h2>
                <span class="text-sm font-bold px-3 py-1 rounded-full bg-sage/10 text-sage" id="rally-count">0 達成</span>
            </div>
            <div id="poi-list" class="space-y-4">
                <!-- スポットリスト -->
            </div>
        </section>

        <!-- タブ: 称号 -->
        <section id="tab-trophy" class="tab-content space-y-8 text-center py-12">
            <div class="relative inline-block">
                <div class="w-48 h-48 rounded-full flex items-center justify-center mx-auto bg-sage/10 border-4 border-sage" id="trophy-circle">
                    <i data-lucide="trophy" size="80" class="text-sage"></i>
                </div>
                <div id="master-badge" class="hidden absolute -top-2 -right-2 bg-red-500 text-white p-3 rounded-full shadow-xl">💮</div>
            </div>
            <div class="space-y-4">
                <h2 class="text-2xl font-bold">マイコレクション</h2>
                <div id="trophy-status" class="opacity-70">
                    散歩を始めて称号を手に入れよう！
                </div>
            </div>
        </section>
    </main>

    <!-- ボトムナビ -->
    <nav id="bottom-nav" class="fixed bottom-0 left-0 right-0 p-4 border-t bg-white/90 backdrop-blur-md z-[100] card-bg">
        <div class="max-w-2xl mx-auto flex justify-around items-center">
            <button onclick="switchTab('planner')" class="nav-btn flex flex-col items-center gap-1 text-sage nav-active" id="btn-planner">
                <i data-lucide="navigation" size="24"></i>
                <span class="text-[10px] font-bold">プラン</span>
            </button>
            <button onclick="switchTab('rally')" class="nav-btn flex flex-col items-center gap-1 opacity-40" id="btn-rally">
                <i data-lucide="map-pin" size="24"></i>
                <span class="text-[10px] font-bold">ラリー</span>
            </button>
            <button onclick="switchTab('trophy')" class="nav-btn flex flex-col items-center gap-1 opacity-40" id="btn-trophy">
                <i data-lucide="award" size="24"></i>
                <span class="text-[10px] font-bold">称号</span>
            </button>
        </div>
    </nav>

    <!-- モーダル -->
    <div id="modal-overlay" class="fixed inset-0 bg-black/80 z-[200] hidden flex items-center justify-center p-6" onclick="closeModal()">
        <div class="w-full max-w-lg rounded-3xl p-8 space-y-6 bg-white card-bg" onclick="event.stopPropagation()">
            <h2 id="modal-name" class="text-2xl font-bold">スポット名</h2>
            <p id="modal-desc" class="opacity-70 leading-relaxed"></p>
            <div class="flex gap-4">
                <button id="modal-stamp-btn" class="flex-1 py-4 rounded-2xl font-bold bg-sage text-white">スタンプを押す</button>
            </div>
        </div>
    </div>

    <script>
        let state = {
            isMidnight: false,
            activeTab: 'planner',
            plannedTime: 30,
            userLocation: null,
            pois: [],
            stamps: JSON.parse(localStorage.getItem('sanpo-stamps') || '[]'),
            map: null,
            userMarker: null,
            poiMarkers: []
        };

        const CATEGORY_LABELS = { shrine: '神社・寺院', park: '公園', historic: '史跡', other: 'スポット' };

        function init() {
            lucide.createIcons();
            initMap();
            getLocation();
            
            document.getElementById('time-range').addEventListener('input', (e) => {
                state.plannedTime = parseInt(e.target.value);
                document.getElementById('time-display').innerText = `${state.plannedTime}分`;
                calculateRoute();
                updateUI();
            });
            
            document.getElementById('retry-btn').onclick = getLocation;
        }

        function initMap() {
            state.map = L.map('map', { zoomControl: false, attributionControl: false }).setView([35.6895, 139.6917], 15);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(state.map);
        }

        function getLocation() {
            const overlay = document.getElementById('geo-overlay');
            const retryBtn = document.getElementById('retry-btn');
            const status = document.getElementById('geo-status');
            
            retryBtn.classList.add('hidden');
            status.innerText = "現在地を取得しています...";

            navigator.geolocation.getCurrentPosition(pos => {
                state.userLocation = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                overlay.classList.add('hidden');
                state.map.setView([state.userLocation.lat, state.userLocation.lng], 15);
                
                if (state.userMarker) state.map.removeLayer(state.userMarker);
                state.userMarker = L.circleMarker([state.userLocation.lat, state.userLocation.lng], {
                    radius: 10, fillColor: '#3b82f6', color: '#fff', weight: 3, fillOpacity: 1
                }).addTo(state.map);

                fetchPOIs();
            }, err => {
                status.innerText = "位置情報の取得に失敗しましたっぴ。設定を確認してね。";
                retryBtn.classList.remove('hidden');
            }, { enableHighAccuracy: true, timeout: 10000 });
        }

        async function fetchPOIs() {
            const { lat, lng } = state.userLocation;
            const query = `[out:json][timeout:25];(node["amenity"="place_of_worship"](around:1500,${lat},${lng});node["leisure"="park"](around:1500,${lat},${lng});node["historic"](around:1500,${lat},${lng}););out center;`;
            
            try {
                const res = await fetch(`https://overpass-api.de/api/interpreter?data=${encodeURIComponent(query)}`);
                const data = await res.json();
                state.pois = data.elements.filter(el => el.tags && el.tags.name).map(el => ({
                    id: el.id,
                    name: el.tags.name,
                    lat: el.lat || el.center.lat,
                    lng: el.lon || el.center.lon,
                    category: el.tags.amenity === 'place_of_worship' ? 'shrine' : el.tags.leisure === 'park' ? 'park' : el.tags.historic ? 'historic' : 'other',
                    distance: getDistance(lat, lng, el.lat || el.center.lat, el.lon || el.center.lon)
                })).sort((a, b) => a.distance - b.distance);
                
                calculateRoute();
                updateUI();
            } catch (e) {
                console.error("POI Fetch Error", e);
            }
        }

        function calculateRoute() {
            let total = 0;
            let selected = [];
            for (let p of state.pois) {
                let walkTime = p.distance * 15; // 1km = 15min
                if (total + walkTime + 10 <= state.plannedTime) {
                    selected.push(p);
                    total += walkTime + 10;
                }
            }
            state.suggestedRoute = { pois: selected, totalTime: Math.round(total) };
            
            // マーカー更新
            state.poiMarkers.forEach(m => state.map.removeLayer(m));
            state.poiMarkers = selected.map(p => {
                return L.circleMarker([p.lat, p.lng], {
                    radius: 7, fillColor: state.isMidnight ? '#F4D03F' : '#87A96B', color: '#fff', weight: 2, fillOpacity: 0.9
                }).addTo(state.map).bindPopup(p.name);
            });
        }

        function updateUI() {
            const body = document.body;
            const headerIcon = document.getElementById('header-icon');
            const cat = document.getElementById('midnight-cat');
            const modeBtn = document.getElementById('mode-btn');

            if (state.isMidnight) {
                body.classList.add('midnight-mode');
                headerIcon.innerHTML = '<i data-lucide="moon" class="text-moon"></i>';
                cat.classList.remove('hidden');
                modeBtn.classList.replace('bg-sage', 'bg-moon');
                modeBtn.classList.replace('text-white', 'text-midnight');
                modeBtn.innerHTML = '<i data-lucide="sun" size="24"></i>';
            } else {
                body.classList.remove('midnight-mode');
                headerIcon.innerHTML = '<i data-lucide="map-pin" class="text-sage"></i>';
                cat.classList.add('hidden');
                modeBtn.classList.replace('bg-moon', 'bg-sage');
                modeBtn.classList.replace('text-midnight', 'text-white');
                modeBtn.innerHTML = '<i data-lucide="moon" size="24"></i>';
            }

            // コース名更新
            if (state.suggestedRoute.pois.length > 0) {
                const firstSpot = state.suggestedRoute.pois[0].name;
                document.getElementById('route-name').innerText = `${firstSpot}を巡る${state.plannedTime}分コース`;
                document.getElementById('route-meta').innerText = `${state.suggestedRoute.pois.length}スポット • 約${state.suggestedRoute.totalTime}分`;
            }

            // ラリーリスト
            const poiList = document.getElementById('poi-list');
            poiList.innerHTML = '';
            state.pois.forEach(p => {
                const isStamped = state.stamps.includes(p.id);
                const div = document.createElement('div');
                div.className = `p-5 rounded-3xl flex justify-between items-center card-bg ${state.isMidnight ? 'bg-navy-card' : 'bg-white'}`;
                div.innerHTML = `
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 rounded-2xl flex items-center justify-center ${isStamped ? 'bg-sage text-white' : 'bg-gray-100 text-gray-400'}">
                            <i data-lucide="${isStamped ? 'check' : 'map-pin'}"></i>
                        </div>
                        <div>
                            <h4 class="font-bold">${p.name}</h4>
                            <p class="text-xs opacity-50">${CATEGORY_LABELS[p.category]} • ${p.distance.toFixed(2)}km</p>
                        </div>
                    </div>
                    <button onclick="openPOI(${p.id})" class="px-4 py-2 rounded-xl text-xs font-bold ${isStamped ? 'opacity-30' : 'bg-sage text-white'}">
                        ${isStamped ? '済' : '詳細'}
                    </button>
                `;
                poiList.appendChild(div);
            });
            document.getElementById('rally-count').innerText = `${state.stamps.length} 達成`;

            // 称号
            const trophyStatus = document.getElementById('trophy-status');
            const badge = document.getElementById('master-badge');
            if (state.stamps.length >= 5) {
                trophyStatus.innerHTML = '<p class="text-xl font-bold text-moon">称号：さんぽマスター</p><p>5つ以上のスポットを制覇しましたっぴ！</p>';
                badge.classList.remove('hidden');
            } else {
                trophyStatus.innerText = `あと${5 - state.stamps.length}つのスタンプで称号ゲット！`;
                badge.classList.add('hidden');
            }

            lucide.createIcons();
        }

        function switchTab(tab) {
            state.activeTab = tab;
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.getElementById(`tab-${tab}`).classList.add('active');
            
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.add('opacity-40'));
            const activeBtn = document.getElementById(`btn-${tab}`);
            activeBtn.classList.remove('opacity-40');
            
            updateUI();
        }

        function toggleMidnight() {
            state.isMidnight = !state.isMidnight;
            updateUI();
            calculateRoute();
        }

        function openPOI(id) {
            const p = state.pois.find(poi => poi.id == id);
            document.getElementById('modal-name').innerText = p.name;
            document.getElementById('modal-desc').innerText = `${CATEGORY_LABELS[p.category]}です。現在地から${p.distance.toFixed(2)}kmの場所にあります。`;
            const btn = document.getElementById('modal-stamp-btn');
            btn.onclick = () => { toggleStamp(id); closeModal(); };
            btn.innerText = state.stamps.includes(id) ? 'スタンプ済み' : 'スタンプを押す';
            document.getElementById('modal-overlay').classList.remove('hidden');
        }

        function closeModal() { document.getElementById('modal-overlay').classList.add('hidden'); }

        function toggleStamp(id) {
            if (state.stamps.includes(id)) {
                state.stamps = state.stamps.filter(s => s !== id);
            } else {
                state.stamps.push(id);
            }
            localStorage.setItem('sanpo-stamps', JSON.stringify(state.stamps));
            updateUI();
        }

        function getDistance(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * (Math.PI / 180);
            const dLon = (lon2 - lon1) * (Math.PI / 180);
            const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) + Math.cos(lat1 * (Math.PI / 180)) * Math.cos(lat2 * (Math.PI / 180)) * Math.sin(dLon / 2) * Math.sin(dLon / 2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        }

        window.onload = init;
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sanpo Palette - 散歩を彩るパレット</title>
    
    <!-- CDNs -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/framer-motion/10.16.4/framer-motion.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        @import "tailwindcss";

        :root {
            --accent: #FF6B6B;
            --bg: #F8F9FA;
            --card: #FFFFFF;
            --text: #2D3436;
            --accent-rgb: 255, 107, 107;
            --card-rgb: 255, 255, 255;
        }

        /* 季節ごとのテーマ */
        .theme-spring { --accent: #FF8E9E; --bg: #FFF5F7; --accent-rgb: 255, 142, 158; }
        .theme-summer { --accent: #4FACFE; --bg: #F0F9FF; --accent-rgb: 79, 172, 254; }
        .theme-autumn { --accent: #E67E22; --bg: #FFF9F0; --accent-rgb: 230, 126, 34; }
        .theme-winter { --accent: #A5C9CA; --bg: #F4F9F9; --accent-rgb: 165, 201, 202; }

        /* 崩壊モード (Ruined Mode) */
        .mode-collapse {
            --accent: #00FF41;
            --bg: #0A0A0A;
            --card: #141414;
            --text: #E0E0E0;
            --accent-rgb: 0, 255, 65;
            filter: sepia(0.2) contrast(1.2);
        }

        body {
            font-family: 'Noto Sans JP', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
            height: 100vh;
            touch-action: manipulation;
        }

        #map {
            height: 100%;
            width: 100%;
            filter: grayscale(0.2);
        }

        .mode-collapse #map {
            filter: invert(1) hue-rotate(180deg) brightness(0.8) contrast(1.2);
        }

        .nav-glass {
            background: rgba(var(--card-rgb), 0.8);
            backdrop-filter: blur(12px);
            border-top: 1px solid rgba(0,0,0,0.05);
        }

        .mode-collapse .nav-glass {
            background: rgba(20, 20, 20, 0.9);
            border-top: 1px solid rgba(0, 255, 65, 0.2);
            box-shadow: 0 -4px 20px rgba(0, 255, 65, 0.1);
        }

        .stamp-card {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 1rem;
            background: var(--card);
            border: 2px dashed rgba(0,0,0,0.1);
            transition: all 0.3s ease;
        }

        .stamp-card.active {
            border: 2px solid var(--accent);
            background: rgba(var(--accent-rgb), 0.1);
            transform: scale(1.05);
        }

        .mode-collapse .stamp-card {
            border-color: rgba(0, 255, 65, 0.3);
            background: #1a1a1a;
        }

        .mode-collapse .stamp-card.active {
            border-color: #00FF41;
            box-shadow: 0 0 15px rgba(0, 255, 65, 0.4);
        }

        .loading-overlay {
            position: fixed;
            inset: 0;
            background: #FFFFFF;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.8s ease;
        }

        .mode-collapse .loading-overlay {
            background: #000000;
            color: #00FF41;
        }

        .gauge-container {
            height: 6px;
            background: rgba(0,0,0,0.05);
            border-radius: 3px;
            overflow: hidden;
            margin-top: 8px;
        }

        .gauge-fill {
            height: 100%;
            background: var(--accent);
            transition: width 1s ease;
        }

        .glitch-text {
            animation: glitch 1s infinite linear alternate-reverse;
        }

        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(-2px, -2px); }
            60% { transform: translate(2px, 2px); }
            80% { transform: translate(2px, -2px); }
            100% { transform: translate(0); }
        }

        .cracked-overlay {
            position: fixed;
            inset: 0;
            pointer-events: none;
            background-image: url('https://www.transparenttextures.com/patterns/cracked-glass.png');
            opacity: 0.1;
            z-index: 100;
            display: none;
        }
        .mode-collapse .cracked-overlay { display: block; }
    </style>
</head>
<body class="theme-spring">

    <div class="cracked-overlay"></div>

    <!-- Loading Screen -->
    <div id="loading-screen" class="loading-overlay">
        <div class="relative mb-8">
            <i data-lucide="cat" class="w-16 h-16 text-accent animate-bounce"></i>
            <div class="absolute -top-2 -right-2">
                <i data-lucide="sparkles" class="w-6 h-6 text-yellow-400 animate-pulse"></i>
            </div>
        </div>
        <h1 class="text-2xl font-bold tracking-widest mb-2">SANPO PALETTE</h1>
        <p class="text-sm opacity-60" id="loading-status">位置情報を取得中...</p>
        <div class="mt-12 text-xs opacity-40 cursor-pointer hover:opacity-100 transition-opacity" onclick="hideLoading()">
            強制的に開始 (Skip)
        </div>
    </div>

    <!-- Header -->
    <header class="fixed top-0 left-0 right-0 p-6 z-50 flex justify-between items-center pointer-events-none">
        <div class="bg-white/80 backdrop-blur-md px-4 py-2 rounded-full shadow-sm border border-black/5 pointer-events-auto flex items-center gap-3">
            <div class="w-8 h-8 bg-accent rounded-full flex items-center justify-center text-white">
                <i data-lucide="map-pin" size="16"></i>
            </div>
            <div>
                <p class="text-[10px] uppercase tracking-tighter opacity-50 font-bold">Current Palette</p>
                <p class="text-xs font-bold" id="current-season-name">Spring Bloom</p>
            </div>
        </div>
        
        <div id="collapse-trigger" class="w-12 h-12 bg-white/80 backdrop-blur-md rounded-full shadow-sm border border-black/5 flex items-center justify-center pointer-events-auto cursor-pointer transition-all active:scale-90" 
             onmousedown="startCollapseTimer()" onmouseup="cancelCollapseTimer()" ontouchstart="startCollapseTimer()" ontouchend="cancelCollapseTimer()">
            <i data-lucide="skull" id="header-icon" class="text-gray-400"></i>
        </div>
    </header>

    <!-- Main Map Container -->
    <main class="relative w-full h-full">
        <div id="map"></div>
        
        <!-- Cat Companion Overlay -->
        <div id="cat-companion" class="fixed pointer-events-none z-40 hidden">
            <div class="relative">
                <i data-lucide="cat" class="text-black w-8 h-8 drop-shadow-lg"></i>
                <div id="cat-heart" class="absolute -top-4 -right-2 text-red-500 hidden">
                    <i data-lucide="heart" size="12" class="fill-current animate-ping"></i>
                </div>
            </div>
        </div>
    </main>

    <!-- UI Panels -->
    <div id="panel-container" class="fixed bottom-24 left-4 right-4 z-50 pointer-events-none">
        <!-- Stamp Panel -->
        <div id="stamp-panel" class="bg-white/90 backdrop-blur-xl p-6 rounded-3xl shadow-2xl border border-black/5 pointer-events-auto transform translate-y-full transition-transform duration-500 hidden">
            <div class="flex justify-between items-center mb-6">
                <h2 class="font-bold text-lg flex items-center gap-2">
                    <i data-lucide="palette" class="text-accent"></i>
                    季節のスタンプ帳
                </h2>
                <button onclick="togglePanel('stamp')" class="opacity-40 hover:opacity-100"><i data-lucide="x"></i></button>
            </div>
            <div class="grid grid-cols-4 gap-3" id="stamp-grid">
                <!-- Stamps will be injected here -->
            </div>
            <p class="mt-6 text-xs opacity-50 text-center">3つ集めると特別な称号が手に入ります</p>
        </div>

        <!-- My Page Panel -->
        <div id="mypage-panel" class="bg-white/90 backdrop-blur-xl p-6 rounded-3xl shadow-2xl border border-black/5 pointer-events-auto transform translate-y-full transition-transform duration-500 hidden">
            <div class="flex justify-between items-center mb-6">
                <h2 class="font-bold text-lg">旅の記録</h2>
                <button onclick="togglePanel('mypage')" class="opacity-40 hover:opacity-100"><i data-lucide="x"></i></button>
            </div>
            
            <div class="space-y-6">
                <div class="flex items-center gap-4 p-4 bg-black/5 rounded-2xl">
                    <div class="w-12 h-12 bg-accent rounded-full flex items-center justify-center text-white">
                        <i data-lucide="footprints"></i>
                    </div>
                    <div>
                        <p class="text-[10px] uppercase opacity-50">Total Distance</p>
                        <p class="text-xl font-bold font-mono" id="stat-distance">0.00 km</p>
                    </div>
                </div>

                <div class="p-4 bg-black/5 rounded-2xl">
                    <div class="flex items-center gap-3 mb-2">
                        <i data-lucide="cat" class="text-accent"></i>
                        <div class="flex-1">
                            <p class="text-xs font-bold" id="cat-level-name">黒猫の影</p>
                            <p class="text-sm opacity-60" id="cat-level-desc">まだ遠くから見守っています...</p>
                        </div>
                    </div>
                    <div class="gauge-container">
                        <div id="cat-gauge" class="gauge-fill" style="width: 0%"></div>
                    </div>
                </div>

                <div id="seasonal-trophies" class="space-y-2">
                    <!-- Seasonal titles will be injected here -->
                </div>

                <div id="collapse-stats" class="hidden p-4 bg-green-500/10 border border-green-500/20 rounded-2xl">
                    <p class="text-[10px] uppercase text-green-500 font-bold mb-2 glitch-text">System Corruption</p>
                    <div class="flex justify-between items-end">
                        <p class="text-2xl font-mono text-green-500" id="stat-collapse">0%</p>
                        <i data-lucide="activity" class="text-green-500 animate-pulse"></i>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bottom Navigation -->
    <nav class="fixed bottom-0 left-0 right-0 h-20 nav-glass z-50 flex justify-around items-center px-6">
        <button onclick="togglePanel('stamp')" class="flex flex-col items-center gap-1 group">
            <div class="w-10 h-10 rounded-xl flex items-center justify-center transition-all group-active:scale-90">
                <i data-lucide="palette" class="text-gray-400 group-hover:text-accent"></i>
            </div>
            <span class="text-[10px] font-bold opacity-40 group-hover:opacity-100">Stamp</span>
        </button>
        
        <button onclick="centerMap()" class="relative -top-6 w-16 h-16 bg-accent rounded-full shadow-lg shadow-accent/40 flex items-center justify-center text-white transition-all active:scale-90">
            <i data-lucide="navigation" size="28"></i>
        </button>

        <button onclick="togglePanel('mypage')" class="flex flex-col items-center gap-1 group">
            <div class="w-10 h-10 rounded-xl flex items-center justify-center transition-all group-active:scale-90">
                <i data-lucide="user" class="text-gray-400 group-hover:text-accent"></i>
            </div>
            <span class="text-[10px] font-bold opacity-40 group-hover:opacity-100">My Page</span>
        </button>
    </nav>

    <!-- Audio Elements -->
    <audio id="se-meow" src="https://assets.mixkit.co/active_storage/sfx/2361/2361-preview.mp3"></audio>
    <audio id="se-stamp" src="https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3"></audio>

    <script>
        // --- Constants & State ---
        const SEASONS = [
            { id: 'spring', title: '春の息吹を辿る者', months: [2, 3, 4], theme: 'theme-spring' },
            { id: 'summer', title: '夏の陽炎を往く探索者', months: [5, 6, 7], theme: 'theme-summer' },
            { id: 'autumn', title: '秋の静寂を聴く者', months: [8, 9, 10], theme: 'theme-autumn' },
            { id: 'winter', title: '冬の銀華を愛でる者', months: [11, 0, 1], theme: 'theme-winter' }
        ];

        let state = {
            isCollapseMode: false,
            totalDistance: 0,
            stamps: [],
            seasonalStats: { spring: 0, summer: 0, autumn: 0, winter: 0 },
            lastPos: null,
            isInitialized: false
        };

        let map, userMarker;
        let collapseTimer;

        // --- Initialization ---
        async function init() {
            try {
                loadState();
                applyTheme();
                
                // 3.5秒後に強制的にローディングを隠すセーフティ
                setTimeout(() => {
                    if (!state.isInitialized) hideLoading();
                }, 3500);

                if (navigator.geolocation) {
                    navigator.geolocation.watchPosition(updatePosition, handleGeoError, {
                        enableHighAccuracy: true,
                        maximumAge: 1000
                    });
                } else {
                    console.warn("Geolocation not supported");
                    hideLoading();
                }
            } catch (e) {
                console.error("Initialization error:", e);
                hideLoading();
            }
        }

        function hideLoading() {
            const screen = document.getElementById('loading-screen');
            if (!screen || screen.style.display === 'none') return;
            
            screen.style.opacity = '0';
            setTimeout(() => {
                screen.style.display = 'none';
                state.isInitialized = true;
            }, 800);
            
            // Audio Context Unlock
            const unlock = () => {
                const meow = document.getElementById('se-meow');
                if (meow) {
                    meow.play().then(() => meow.pause()).catch(() => {});
                }
                document.removeEventListener('click', unlock);
            };
            document.addEventListener('click', unlock);
        }

        function applyTheme() {
            const month = new Date().getMonth();
            const season = SEASONS.find(s => s.months.includes(month)) || SEASONS[0];
            document.body.className = state.isCollapseMode ? 'mode-collapse' : season.theme;
            document.getElementById('current-season-name').innerText = state.isCollapseMode ? 'CORRUPTED' : season.id.toUpperCase();
            
            if (state.isCollapseMode) {
                document.getElementById('header-icon').classList.add('text-green-500', 'glitch-text');
                document.getElementById('collapse-stats').classList.remove('hidden');
            } else {
                document.getElementById('header-icon').classList.remove('text-green-500', 'glitch-text');
                document.getElementById('collapse-stats').classList.add('hidden');
            }
        }

        // --- Map & Location ---
        function updatePosition(position) {
            const { latitude, longitude } = position.coords;
            const currentPos = { lat: latitude, lng: longitude };

            if (!map) {
                initMap(currentPos);
                hideLoading();
            }

            if (state.lastPos) {
                const dist = calculateDistance(state.lastPos, currentPos);
                if (dist > 0.005) { // 5m以上移動
                    state.totalDistance += dist;
                    updateStats();
                    checkCatInteraction();
                    saveState();
                }
            }

            state.lastPos = currentPos;
            if (userMarker) userMarker.setPosition(currentPos);
            updateCatPosition(currentPos);
        }

        function initMap(pos) {
            map = new google.maps.Map(document.getElementById('map'), {
                center: pos,
                zoom: 17,
                disableDefaultUI: true,
                styles: state.isCollapseMode ? [] : [
                    { "featureType": "all", "elementType": "labels.text.fill", "stylers": [{ "color": "#7c93a3" }, { "lightness": "-10" }] }
                ]
            });

            userMarker = new google.maps.Marker({
                position: pos,
                map: map,
                icon: {
                    path: google.maps.SymbolPath.CIRCLE,
                    scale: 10,
                    fillColor: state.isCollapseMode ? '#00FF41' : '#FF6B6B',
                    fillOpacity: 1,
                    strokeWeight: 4,
                    strokeColor: '#FFFFFF'
                }
            });

            generateDummySpots(pos);
        }

        function updateCatPosition(userPos) {
            const level = getCatLevel();
            if (level < 2) return;

            const catEl = document.getElementById('cat-companion');
            catEl.classList.remove('hidden');
            
            // 簡易的な中央付近への表示
            catEl.style.left = '50%';
            catEl.style.top = '60%';
        }

        // --- Mechanics ---
        function calculateDistance(p1, p2) {
            const R = 6371;
            const dLat = (p2.lat - p1.lat) * Math.PI / 180;
            const dLng = (p2.lng - p1.lng) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                      Math.cos(p1.lat * Math.PI / 180) * Math.cos(p2.lat * Math.PI / 180) *
                      Math.sin(dLng/2) * Math.sin(dLng/2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        function getCatLevel() {
            if (state.totalDistance > 15) return 3;
            if (state.totalDistance > 5) return 2;
            if (state.totalDistance > 0) return 1;
            return 0;
        }

        function checkCatInteraction() {
            const level = getCatLevel();
            if (level >= 2 && Math.random() < 0.05) {
                const meow = document.getElementById('se-meow');
                if (meow) meow.play().catch(() => {});
            }
        }

        function generateDummySpots(pos) {
            for (let i = 0; i < 5; i++) {
                const lat = pos.lat + (Math.random() - 0.5) * 0.01;
                const lng = pos.lng + (Math.random() - 0.5) * 0.01;
                
                const marker = new google.maps.Marker({
                    position: { lat, lng },
                    map: map,
                    icon: {
                        url: 'https://cdn-icons-png.flaticon.com/512/684/684908.png',
                        scaledSize: new google.maps.Size(30, 30)
                    }
                });

                marker.addListener('click', () => {
                    collectStamp(i);
                });
            }
        }

        function collectStamp(id) {
            if (state.stamps.includes(id)) return;
            
            state.stamps.push(id);
            const stampSound = document.getElementById('se-stamp');
            if (stampSound) stampSound.play().catch(() => {});
            
            const month = new Date().getMonth();
            const season = SEASONS.find(s => s.months.includes(month)) || SEASONS[0];
            state.seasonalStats[season.id]++;
            
            updateStats();
            saveState();
            alert("スタンプを獲得しました！");
        }

        // --- UI & State Management ---
        function togglePanel(type) {
            const stamp = document.getElementById('stamp-panel');
            const mypage = document.getElementById('mypage-panel');
            
            if (type === 'stamp') {
                stamp.classList.toggle('hidden');
                setTimeout(() => stamp.classList.toggle('translate-y-full'), 10);
                mypage.classList.add('hidden', 'translate-y-full');
                renderStamps();
            } else {
                mypage.classList.toggle('hidden');
                setTimeout(() => mypage.classList.toggle('translate-y-full'), 10);
                stamp.classList.add('hidden', 'translate-y-full');
                updateStats();
            }
        }

        function renderStamps() {
            const grid = document.getElementById('stamp-grid');
            if (!grid) return;
            grid.innerHTML = '';
            for (let i = 0; i < 8; i++) {
                const div = document.createElement('div');
                div.className = `stamp-card ${state.stamps.includes(i) ? 'active' : ''}`;
                div.innerHTML = state.stamps.includes(i) ? '<i data-lucide="check" class="text-accent"></i>' : '';
                grid.appendChild(div);
            }
            lucide.createIcons();
        }

        function updateStats() {
            document.getElementById('stat-distance').innerText = `${state.totalDistance.toFixed(2)} km`;
            
            const level = getCatLevel();
            document.getElementById('cat-level-name').innerText = ["", "黒猫の影", "人懐っこい黒猫", "旅の相棒"][level];
            document.getElementById('cat-level-desc').innerText = [
                "", 
                "まだ遠くから見守っています...", 
                "少しずつ心を開いてくれているようです。時々鳴き声が聞こえます。", 
                "あなたの後ろをトコトコとついてくるようになりました！"
            ][level];
            document.getElementById('cat-gauge').style.width = `${Math.min((state.totalDistance / 15) * 100, 100)}%`;
            document.getElementById('cat-heart').classList.toggle('hidden', level < 3);
            
            const seasonalTrophies = document.getElementById('seasonal-trophies');
            if (seasonalTrophies) {
                seasonalTrophies.innerHTML = '';
                SEASONS.forEach(s => {
                    if (state.seasonalStats[s.id] >= 3) {
                        const div = document.createElement('div');
                        div.className = "p-3 bg-accent/10 rounded-xl text-accent font-bold text-xs flex items-center justify-center gap-2";
                        div.innerHTML = `<i data-lucide="sparkles" size="14"></i> ${s.title}`;
                        seasonalTrophies.appendChild(div);
                    }
                });
            }

            if (state.isCollapseMode) {
                document.getElementById('stat-collapse').innerText = `${Math.min(state.totalDistance * 10, 100).toFixed(0)}%`;
            }

            lucide.createIcons();
        }

        function startCollapseTimer() {
            collapseTimer = setTimeout(() => {
                state.isCollapseMode = !state.isCollapseMode;
                applyTheme();
                saveState();
                alert(state.isCollapseMode ? "システムが崩壊しました..." : "世界が再構築されました。");
            }, 2000);
        }

        function cancelCollapseTimer() {
            clearTimeout(collapseTimer);
        }

        function centerMap() {
            if (state.lastPos && map) map.setCenter(state.lastPos);
        }

        function saveState() {
            localStorage.setItem('sanpo_palette_state', JSON.stringify(state));
        }

        function loadState() {
            const saved = localStorage.getItem('sanpo_palette_state');
            if (saved) state = { ...state, ...JSON.parse(saved) };
        }

        function handleGeoError(err) {
            console.warn(`ERROR(${err.code}): ${err.message}`);
            const status = document.getElementById('loading-status');
            if (status) status.innerText = "位置情報の取得に失敗しました。設定を確認してください。";
        }

        window.onload = () => {
            const script = document.createElement('script');
            script.src = `https://maps.googleapis.com/maps/api/js?key=${window.GOOGLE_MAPS_API_KEY || ''}&callback=init`;
            script.async = true;
            document.head.appendChild(script);
            lucide.createIcons();
        };
    </script>
</body>
</html>

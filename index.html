<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sanpo Palette - 散歩を彩るパレット</title>
    
    <!-- CDNs -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --sakura: #FFB7C5;
            --leaf: #98FB98;
            --accent: #FF6B6B;
            --bg: #FFF9FB;
            --card: #FFFFFF;
            --text: #4A4A4A;
            --accent-rgb: 255, 107, 107;
        }

        .theme-midnight {
            --bg: #0B1026;
            --card: #1A1F3C;
            --text: #E0E0E0;
            --accent: #C0C0C0;
            --accent-rgb: 192, 192, 192;
        }

        .theme-collapse {
            --bg: #050505;
            --card: #111111;
            --text: #00FF41;
            --accent: #00FF41;
            --accent-rgb: 0, 255, 65;
        }

        body {
            font-family: 'Noto Sans JP', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
            height: 100vh;
            touch-action: manipulation;
        }

        #map-container {
            position: absolute;
            inset: 0;
            transition: transform 0.3s ease-out;
        }

        #map {
            height: 100%;
            width: 100%;
            z-index: 1;
        }

        .nav-glass {
            background: rgba(var(--card-rgb, 255, 255, 255), 0.85);
            backdrop-filter: blur(16px);
            border-top: 1px solid rgba(0,0,0,0.05);
        }

        .theme-midnight .nav-glass {
            background: rgba(26, 31, 60, 0.9);
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .theme-collapse .nav-glass {
            background: rgba(0, 0, 0, 0.9);
            border-top: 1px solid #00FF41;
        }

        .btn-primary {
            background: var(--accent);
            color: white;
            padding: 14px 28px;
            border-radius: 999px;
            font-weight: bold;
            box-shadow: 0 8px 20px rgba(var(--accent-rgb), 0.3);
            transition: all 0.2s active:scale-95;
        }

        .loading-overlay {
            position: fixed;
            inset: 0;
            background: var(--bg);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
        }

        .route-card {
            background: var(--card);
            border-radius: 24px;
            padding: 20px;
            box-shadow: 0 12px 40px rgba(0,0,0,0.08);
            border: 1px solid rgba(0,0,0,0.05);
            backdrop-filter: blur(8px);
        }

        .theme-collapse .route-card {
            border-color: #00FF41;
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.2);
        }

        /* Leaflet Customization */
        .leaflet-vignette {
            box-shadow: inset 0 0 120px rgba(0,0,0,0.25);
            pointer-events: none;
            position: absolute;
            inset: 0;
            z-index: 1000;
        }

        .theme-collapse .leaflet-tile {
            filter: invert(100%) hue-rotate(180deg) brightness(0.6) contrast(1.4) saturate(0.5);
        }

        .theme-midnight .leaflet-tile {
            filter: brightness(0.6) invert(100%) contrast(1.2) hue-rotate(200deg) saturate(0.4);
        }

        .gauge-container {
            height: 6px;
            background: rgba(0,0,0,0.05);
            border-radius: 3px;
            overflow: hidden;
        }

        .gauge-fill {
            height: 100%;
            background: var(--accent);
            transition: width 1s ease;
        }

        .glitch-text {
            animation: glitch 1s infinite linear alternate-reverse;
        }

        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(-2px, -2px); }
            60% { transform: translate(2px, 2px); }
            80% { transform: translate(2px, -2px); }
            100% { transform: translate(0); }
        }

        /* Panel Animations */
        .panel-hidden { transform: translateY(120%); }
        .panel-visible { transform: translateY(0); }
    </style>
</head>
<body class="theme-spring">

    <div id="vignette" class="leaflet-vignette"></div>

    <!-- Loading Screen -->
    <div id="loading-screen" class="loading-overlay">
        <div class="mb-10 relative">
            <i data-lucide="palette" class="w-24 h-24 text-accent animate-bounce"></i>
            <div class="absolute -top-4 -right-4">
                <i data-lucide="sparkles" class="w-8 h-8 text-yellow-400 animate-pulse"></i>
            </div>
        </div>
        <h1 class="text-4xl font-bold mb-4 tracking-[0.2em]">SANPO PALETTE</h1>
        <p class="text-sm opacity-60 mb-12 leading-relaxed">散歩を彩る、あなただけのパレット。<br>3月のテーマ：桜と新緑</p>
        
        <button id="start-btn" class="btn-primary flex items-center gap-3 text-lg">
            <i data-lucide="play" class="fill-current"></i>
            アプリを起動
        </button>
        
        <p id="loading-status" class="mt-6 text-xs opacity-40 font-medium">位置情報とセンサーの許可が必要です</p>
    </div>

    <!-- Header -->
    <header class="fixed top-0 left-0 right-0 p-6 z-50 flex justify-between items-center pointer-events-none">
        <div class="bg-white/90 backdrop-blur-md px-5 py-2.5 rounded-full shadow-lg border border-black/5 pointer-events-auto flex items-center gap-4">
            <div id="mode-icon" class="w-9 h-9 bg-accent rounded-full flex items-center justify-center text-white shadow-inner">
                <i data-lucide="sun" size="18"></i>
            </div>
            <div>
                <p class="text-[10px] uppercase tracking-widest opacity-50 font-black">Current Palette</p>
                <p class="text-sm font-bold" id="palette-name">March Sakura</p>
            </div>
        </div>
        
        <div id="collapse-trigger" class="w-12 h-12 bg-white/90 backdrop-blur-md rounded-full shadow-lg border border-black/5 flex items-center justify-center pointer-events-auto cursor-pointer transition-all active:scale-90">
            <i data-lucide="skull" id="header-icon" class="text-gray-400"></i>
        </div>
    </header>

    <!-- Map Container -->
    <main class="relative w-full h-full">
        <div id="map-container">
            <div id="map"></div>
        </div>
        
        <!-- Navigation Card -->
        <div id="nav-card" class="fixed top-28 left-6 right-6 z-40 hidden">
            <div class="route-card flex items-center gap-5">
                <div id="nav-arrow" class="w-16 h-16 bg-accent/10 rounded-2xl flex items-center justify-center text-accent shadow-sm">
                    <i data-lucide="arrow-up" size="36"></i>
                </div>
                <div class="flex-1">
                    <p class="text-[10px] opacity-50 font-black uppercase tracking-widest mb-1">Next Destination</p>
                    <p class="text-lg font-bold leading-tight" id="nav-target">公園の入り口</p>
                    <div class="flex items-center gap-2 mt-1">
                        <i data-lucide="navigation-2" size="12" class="text-accent"></i>
                        <p class="text-sm font-bold opacity-70" id="nav-dist">あと 120m</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Cat Companion (Overlay) -->
        <div id="cat-companion" class="fixed pointer-events-none z-40 hidden transition-all duration-1000">
            <div class="relative">
                <i data-lucide="cat" class="text-black w-12 h-12 drop-shadow-2xl"></i>
                <div id="cat-heart" class="absolute -top-6 -right-2 text-red-500 hidden">
                    <i data-lucide="heart" size="16" class="fill-current animate-ping"></i>
                </div>
            </div>
        </div>
    </main>

    <!-- UI Panels -->
    <div id="panel-container" class="fixed bottom-24 left-4 right-4 z-50 pointer-events-none">
        <!-- Plan Panel -->
        <div id="plan-panel" class="bg-white/95 backdrop-blur-2xl p-8 rounded-[40px] shadow-2xl border border-black/5 pointer-events-auto panel-hidden transition-transform duration-500 ease-out hidden">
            <h2 class="font-bold text-2xl mb-8 flex items-center gap-3">
                <i data-lucide="map" class="text-accent"></i> 散歩プランを作成
            </h2>
            <div class="space-y-8">
                <div>
                    <div class="flex justify-between mb-4">
                        <label class="text-xs font-black opacity-40 uppercase tracking-widest">散歩時間</label>
                        <span id="time-val" class="text-lg font-black text-accent">60 分</span>
                    </div>
                    <input type="range" id="time-slider" min="30" max="120" step="15" value="60" class="w-full h-2 bg-black/5 rounded-lg appearance-none cursor-pointer accent-accent">
                </div>
                <div class="grid grid-cols-2 gap-5">
                    <button onclick="generateRoute('circular')" class="p-5 bg-black/5 rounded-3xl text-center hover:bg-black/10 transition-all active:scale-95">
                        <i data-lucide="refresh-cw" class="mx-auto mb-3 text-accent"></i>
                        <p class="text-xs font-bold">おまかせ周回</p>
                    </button>
                    <button onclick="showRally()" class="p-5 bg-black/5 rounded-3xl text-center hover:bg-black/10 transition-all active:scale-95">
                        <i data-lucide="list" class="mx-auto mb-3 text-accent"></i>
                        <p class="text-xs font-bold">スポット選択</p>
                    </button>
                </div>
                <button id="start-walk-btn" class="w-full btn-primary mt-4 text-lg py-4">散歩を開始する</button>
            </div>
        </div>

        <!-- Rally Panel -->
        <div id="rally-panel" class="bg-white/95 backdrop-blur-2xl p-8 rounded-[40px] shadow-2xl border border-black/5 pointer-events-auto panel-hidden transition-transform duration-500 ease-out hidden">
            <div class="flex justify-between items-center mb-8">
                <h2 class="font-bold text-2xl">周辺のスポット</h2>
                <button onclick="togglePanel('plan')" class="w-10 h-10 bg-black/5 rounded-full flex items-center justify-center"><i data-lucide="chevron-left" size="20"></i></button>
            </div>
            <div id="rally-list" class="space-y-4 max-h-80 overflow-y-auto pr-2 custom-scrollbar">
                <!-- Spots will be injected here -->
            </div>
        </div>

        <!-- Trophy Panel -->
        <div id="trophy-panel" class="bg-white/95 backdrop-blur-2xl p-8 rounded-[40px] shadow-2xl border border-black/5 pointer-events-auto panel-hidden transition-transform duration-500 ease-out hidden">
            <h2 class="font-bold text-2xl mb-8">旅の記録</h2>
            <div class="grid grid-cols-2 gap-5 mb-8">
                <div class="p-5 bg-black/5 rounded-3xl">
                    <p class="text-[10px] opacity-40 uppercase font-black tracking-widest mb-1">Total Distance</p>
                    <p class="text-2xl font-black font-mono" id="stat-dist-val">0.00 km</p>
                </div>
                <div class="p-5 bg-black/5 rounded-3xl">
                    <p class="text-[10px] opacity-40 uppercase font-black tracking-widest mb-1">Cat Intimacy</p>
                    <p class="text-2xl font-black font-mono" id="stat-cat-val">Lv. 1</p>
                </div>
            </div>
            <div class="space-y-4">
                <p class="text-[10px] font-black opacity-40 uppercase tracking-widest">獲得した称号</p>
                <div id="title-list" class="flex flex-wrap gap-3">
                    <!-- Titles -->
                </div>
            </div>
        </div>
    </div>

    <!-- Bottom Navigation -->
    <nav class="fixed bottom-0 left-0 right-0 h-24 nav-glass z-50 flex justify-around items-center px-8">
        <button onclick="togglePanel('plan')" id="tab-plan" class="flex flex-col items-center gap-1.5 group">
            <div class="w-12 h-12 rounded-2xl flex items-center justify-center transition-all group-active:scale-90">
                <i data-lucide="map" class="text-gray-400 group-hover:text-accent transition-colors"></i>
            </div>
            <span class="text-[10px] font-black opacity-40 uppercase tracking-widest">Plan</span>
        </button>
        <button onclick="togglePanel('rally')" id="tab-rally" class="flex flex-col items-center gap-1.5 group">
            <div class="w-12 h-12 rounded-2xl flex items-center justify-center transition-all group-active:scale-90">
                <i data-lucide="flag" class="text-gray-400 group-hover:text-accent transition-colors"></i>
            </div>
            <span class="text-[10px] font-black opacity-40 uppercase tracking-widest">Rally</span>
        </button>
        <button onclick="togglePanel('trophy')" id="tab-trophy" class="flex flex-col items-center gap-1.5 group">
            <div class="w-12 h-12 rounded-2xl flex items-center justify-center transition-all group-active:scale-90">
                <i data-lucide="award" class="text-gray-400 group-hover:text-accent transition-colors"></i>
            </div>
            <span class="text-[10px] font-black opacity-40 uppercase tracking-widest">Trophies</span>
        </button>
    </nav>

    <script>
        // --- State ---
        let state = {
            mode: 'spring', // spring, midnight, collapse
            isWalking: false,
            distance: 0,
            stamps: [],
            titles: [],
            currentRoute: [],
            currentStep: 0,
            pos: null,
            heading: 0,
            lastActivity: Date.now(),
            isInitialized: false
        };

        let map, userMarker, routePolyline;
        let collapseTimer;

        // --- Init ---
        document.getElementById('start-btn').addEventListener('click', async () => {
            const status = document.getElementById('loading-status');
            status.innerText = "位置情報を取得しています...";
            
            try {
                // 1. Geolocation
                const pos = await getCurrentPosition();
                state.pos = [pos.coords.latitude, pos.coords.longitude];
                
                // 2. Sensors (iOS requires permission)
                if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                    try {
                        const permission = await DeviceOrientationEvent.requestPermission();
                        if (permission === 'granted') {
                            window.addEventListener('deviceorientation', handleOrientation);
                        }
                    } catch (e) { console.warn("Orientation permission denied", e); }
                } else {
                    window.addEventListener('deviceorientation', handleOrientation);
                }

                // 3. Setup Map & UI
                initMap();
                loadProgress();
                hideLoading();
                
                // 4. Start Update Loop
                setInterval(updateLoop, 1000);
                
                state.isInitialized = true;
                speak("アプリが起動しました。散歩の準備をしましょう。");
            } catch (err) {
                console.error(err);
                status.innerText = "エラー: 位置情報を許可して再読み込みしてください";
            }
        });

        function hideLoading() {
            const screen = document.getElementById('loading-screen');
            screen.style.opacity = '0';
            setTimeout(() => screen.style.display = 'none', 800);
        }

        function initMap() {
            map = L.map('map', {
                zoomControl: false,
                attributionControl: false,
                dragging: true,
                touchZoom: true
            }).setView(state.pos, 17);

            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

            userMarker = L.circleMarker(state.pos, {
                radius: 12,
                fillColor: 'var(--accent)',
                fillOpacity: 1,
                color: 'white',
                weight: 4
            }).addTo(map);

            // Time selector update
            document.getElementById('time-slider').addEventListener('input', (e) => {
                document.getElementById('time-val').innerText = `${e.target.value} 分`;
            });

            // Long press for Collapse Mode
            const trigger = document.getElementById('collapse-trigger');
            trigger.addEventListener('mousedown', startCollapseTimer);
            trigger.addEventListener('touchstart', startCollapseTimer);
            trigger.addEventListener('mouseup', cancelCollapseTimer);
            trigger.addEventListener('touchend', cancelCollapseTimer);

            checkTimeMode();
        }

        // --- Core Logic ---
        function getCurrentPosition() {
            return new Promise((resolve, reject) => {
                navigator.geolocation.getCurrentPosition(resolve, reject, { 
                    enableHighAccuracy: true,
                    timeout: 10000
                });
            });
        }

        function handleOrientation(e) {
            if (e.webkitCompassHeading) {
                state.heading = e.webkitCompassHeading;
            } else if (e.alpha) {
                state.heading = 360 - e.alpha;
            }
            
            // Heading Up rotation logic
            if (state.isWalking && map) {
                const mapEl = document.getElementById('map-container');
                mapEl.style.transform = `rotate(${-state.heading}deg)`;
            }
        }

        function checkTimeMode() {
            const hour = new Date().getHours();
            if (hour >= 18 || hour < 5) {
                setMode('midnight');
            } else {
                setMode('spring');
            }
        }

        function setMode(mode) {
            state.mode = mode;
            document.body.className = `theme-${mode}`;
            const icon = document.getElementById('mode-icon');
            const palette = document.getElementById('palette-name');
            const headerIcon = document.getElementById('header-icon');
            
            if (mode === 'midnight') {
                icon.innerHTML = '<i data-lucide="moon"></i>';
                palette.innerText = 'Midnight Blue';
                headerIcon.classList.remove('text-green-500', 'glitch-text');
            } else if (mode === 'collapse') {
                icon.innerHTML = '<i data-lucide="skull"></i>';
                palette.innerText = 'SYSTEM CORRUPTED';
                headerIcon.classList.add('text-green-500', 'glitch-text');
            } else {
                icon.innerHTML = '<i data-lucide="sun"></i>';
                palette.innerText = 'March Sakura';
                headerIcon.classList.remove('text-green-500', 'glitch-text');
            }
            lucide.createIcons();
        }

        // --- Routing ---
        async function generateRoute(type) {
            const time = parseInt(document.getElementById('time-slider').value);
            const radius = (time / 60) * 1500; // ~4km/h -> 1.5km radius
            
            if (state.mode === 'collapse') {
                generateCollapseRoute();
                return;
            }

            // Overpass API to fetch POIs
            const query = `[out:json];node(around:${radius},${state.pos[0]},${state.pos[1]})["tourism"~"attraction|viewpoint|museum|gallery|park"];out 5;`;
            try {
                const res = await fetch(`https://overpass-api.interpreter.de/api/interpreter?data=${encodeURIComponent(query)}`)
                    .catch(() => fetch(`https://overpass-api.de/api/interpreter?data=${encodeURIComponent(query)}`));
                const data = await res.json();
                
                if (!data.elements || data.elements.length === 0) {
                    alert("周辺にスポットが見つかりませんでした。少し場所を変えてみてください。");
                    return;
                }

                state.currentRoute = data.elements.map(e => ({
                    lat: e.lat,
                    lng: e.lon,
                    name: e.tags.name || "名もなき場所"
                }));
                
                // Add start point to end to make it circular
                state.currentRoute.push({ lat: state.pos[0], lng: state.pos[1], name: "スタート地点" });
                
                startWalk();
            } catch (err) {
                console.error(err);
                alert("スポット情報の取得に失敗しました。");
            }
        }

        function generateCollapseRoute() {
            // Decadent logic: Start -> Scavenge -> White Cat -> Start
            // Roundabout paths: offset points
            state.currentRoute = [
                { lat: state.pos[0] + 0.006, lng: state.pos[1] + 0.004, name: "廃墟 (Scavenge)" },
                { lat: state.pos[0] - 0.004, lng: state.pos[1] + 0.009, name: "白猫の祭壇" },
                { lat: state.pos[0], lng: state.pos[1], name: "帰還ゲート" }
            ];
            startWalk();
        }

        function startWalk() {
            state.isWalking = true;
            state.currentStep = 0;
            state.lastActivity = Date.now();
            
            togglePanel(null);
            document.getElementById('nav-card').classList.remove('hidden');
            updateNav();
            drawRoute();
            
            speak("散歩を開始します。最初の目的地、" + state.currentRoute[0].name + "へ向かってください。");
        }

        function updateNav() {
            if (!state.isWalking || !state.currentRoute[state.currentStep]) return;

            const target = state.currentRoute[state.currentStep];
            document.getElementById('nav-target').innerText = target.name;
            
            const dist = getDistance(state.pos, [target.lat, target.lng]);
            document.getElementById('nav-dist').innerText = `あと ${Math.round(dist)}m`;
            
            // Arrow rotation logic (relative to heading)
            const angle = getAngle(state.pos, [target.lat, target.lng]);
            const arrowEl = document.getElementById('nav-arrow');
            arrowEl.style.transform = `rotate(${angle - state.heading}deg)`;
            
            if (dist < 25) {
                reachStep();
            }
        }

        function reachStep() {
            const spot = state.currentRoute[state.currentStep];
            speak(spot.name + "に到着しました。");
            
            if (!state.stamps.includes(spot.name)) {
                state.stamps.push(spot.name);
            }
            
            state.currentStep++;
            
            if (state.currentStep >= state.currentRoute.length) {
                finishWalk();
            } else {
                speak("次の目的地は、" + state.currentRoute[state.currentStep].name + "です。");
                updateNav();
            }
        }

        function finishWalk() {
            state.isWalking = false;
            document.getElementById('nav-card').classList.add('hidden');
            if (routePolyline) map.removeLayer(routePolyline);
            
            speak("お疲れ様でした。散歩が完了しました。パレットが彩られました。");
            
            // Check Seasonal Titles
            if (state.mode === 'spring' && state.stamps.length >= 3) {
                addTitle("春のパレット職人");
            }
            if (state.mode === 'collapse') {
                addTitle("虚無を越えし者");
            }
            
            saveProgress();
            alert("散歩完了！記録が保存されました。");
            togglePanel('trophy');
        }

        // --- Helpers ---
        function getDistance(p1, p2) {
            const R = 6371e3;
            const φ1 = p1[0] * Math.PI/180;
            const φ2 = p2[0] * Math.PI/180;
            const Δφ = (p2[0]-p1[0]) * Math.PI/180;
            const Δλ = (p2[1]-p1[1]) * Math.PI/180;
            const a = Math.sin(Δφ/2) * Math.sin(Δφ/2) +
                      Math.cos(φ1) * Math.cos(φ2) *
                      Math.sin(Δλ/2) * Math.sin(Δλ/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return R * c;
        }

        function getAngle(p1, p2) {
            const dy = p2[0] - p1[0];
            const dx = Math.cos(Math.PI/180 * p1[0]) * (p2[1] - p1[1]);
            return Math.atan2(dx, dy) * 180 / Math.PI;
        }

        function drawRoute() {
            if (routePolyline) map.removeLayer(routePolyline);
            const pts = [[state.pos[0], state.pos[1]], ...state.currentRoute.map(r => [r.lat, r.lng])];
            routePolyline = L.polyline(pts, { 
                color: 'var(--accent)', 
                weight: 6, 
                dashArray: '12, 12',
                opacity: 0.6
            }).addTo(map);
            map.fitBounds(routePolyline.getBounds(), { padding: [50, 50] });
        }

        function speak(text) {
            if (!window.speechSynthesis) return;
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'ja-JP';
            msg.rate = 1.0;
            window.speechSynthesis.speak(msg);
        }

        // --- Update Loop ---
        async function updateLoop() {
            if (!state.isInitialized) return;

            try {
                const pos = await getCurrentPosition();
                const newPos = [pos.coords.latitude, pos.coords.longitude];
                
                if (state.pos) {
                    const d = getDistance(state.pos, newPos);
                    if (d > 1.5) { // 1.5m以上移動
                        state.distance += d / 1000;
                        state.lastActivity = Date.now();
                        state.pos = newPos;
                        userMarker.setLatLng(newPos);
                        if (!state.isWalking) map.panTo(newPos);
                    }
                }

                if (state.isWalking) {
                    updateNav();
                    
                    // 1-Minute Rule for Collapse Mode
                    if (state.mode === 'collapse') {
                        if (Date.now() - state.lastActivity > 60000) {
                            alert("活動が停止したため、システムが強制終了されました。");
                            location.reload();
                        }
                    }
                }

                updateStatsUI();
                updateCat();
            } catch (e) { console.error("Update loop error", e); }
        }

        function updateCat() {
            const cat = document.getElementById('cat-companion');
            if (state.distance >= 15) {
                cat.classList.remove('hidden');
                document.getElementById('cat-heart').classList.remove('hidden');
                // Simple follow logic: offset from center
                cat.style.left = '50%';
                cat.style.top = '65%';
            }
        }

        // --- UI Logic ---
        function togglePanel(id) {
            const panels = ['plan-panel', 'rally-panel', 'trophy-panel'];
            panels.forEach(p => {
                const el = document.getElementById(p);
                const tab = document.getElementById(`tab-${p.split('-')[0]}`);
                if (p === `${id}-panel`) {
                    el.classList.remove('hidden');
                    setTimeout(() => {
                        el.classList.remove('panel-hidden');
                        el.classList.add('panel-visible');
                    }, 10);
                    if (tab) tab.querySelector('i').classList.add('text-accent');
                } else {
                    el.classList.remove('panel-visible');
                    el.classList.add('panel-hidden');
                    setTimeout(() => el.classList.add('hidden'), 500);
                    if (tab) tab.querySelector('i').classList.remove('text-accent');
                }
            });
        }

        async function showRally() {
            togglePanel('rally');
            const list = document.getElementById('rally-list');
            list.innerHTML = '<div class="flex justify-center p-10"><i data-lucide="loader" class="animate-spin text-accent"></i></div>';
            lucide.createIcons();
            
            const query = `[out:json];node(around:1500,${state.pos[0]},${state.pos[1]})["tourism"~"attraction|viewpoint|museum|gallery|park"];out 15;`;
            try {
                const res = await fetch(`https://overpass-api.de/api/interpreter?data=${encodeURIComponent(query)}`);
                const data = await res.json();
                
                list.innerHTML = '';
                if (!data.elements || data.elements.length === 0) {
                    list.innerHTML = '<p class="text-center text-sm opacity-40 p-10">スポットが見つかりませんでした。</p>';
                    return;
                }

                data.elements.forEach(e => {
                    const name = e.tags.name || "名もなき場所";
                    const dist = Math.round(getDistance(state.pos, [e.lat, e.lon]));
                    const div = document.createElement('div');
                    div.className = "p-5 bg-black/5 rounded-3xl flex justify-between items-center group active:bg-black/10 transition-colors";
                    div.innerHTML = `
                        <div>
                            <p class="text-sm font-bold">${name}</p>
                            <p class="text-[10px] opacity-40 font-bold uppercase tracking-widest mt-0.5">${dist}m away</p>
                        </div>
                        <button onclick="addToRoute(${e.lat}, ${e.lon}, '${name}')" class="w-10 h-10 bg-accent/10 text-accent rounded-full flex items-center justify-center">
                            <i data-lucide="plus" size="18"></i>
                        </button>
                    `;
                    list.appendChild(div);
                });
                lucide.createIcons();
            } catch (e) {
                list.innerHTML = '<p class="text-center text-sm text-red-400 p-10">データの取得に失敗しました。</p>';
            }
        }

        function addToRoute(lat, lng, name) {
            state.currentRoute.push({ lat, lng, name });
            speak(name + "をルートに追加しました。");
            const btn = event.currentTarget;
            btn.innerHTML = '<i data-lucide="check" size="18"></i>';
            btn.classList.replace('bg-accent/10', 'bg-green-500/10');
            btn.classList.replace('text-accent', 'text-green-500');
            lucide.createIcons();
        }

        function updateStatsUI() {
            document.getElementById('stat-dist-val').innerText = `${state.distance.toFixed(2)} km`;
            document.getElementById('stat-cat-val').innerText = `Lv. ${Math.floor(state.distance / 5) + 1}`;
            
            const list = document.getElementById('title-list');
            list.innerHTML = '';
            state.titles.forEach(t => {
                const span = document.createElement('span');
                span.className = "px-4 py-1.5 bg-accent/10 text-accent rounded-full text-[10px] font-black uppercase tracking-widest border border-accent/20";
                span.innerText = t;
                list.appendChild(span);
            });
        }

        function addTitle(title) {
            if (!state.titles.includes(title)) {
                state.titles.push(title);
                speak("新しい称号、" + title + "を獲得しました。");
                saveProgress();
            }
        }

        // --- Collapse Mode Timer ---
        function startCollapseTimer() {
            collapseTimer = setTimeout(() => {
                setMode('collapse');
                speak("システム崩壊。虚無の散歩を開始します。");
                generateCollapseRoute();
            }, 2000);
        }

        function cancelCollapseTimer() {
            clearTimeout(collapseTimer);
        }

        // --- Storage ---
        function saveProgress() {
            localStorage.setItem('sanpo_palette_v3', JSON.stringify({
                distance: state.distance,
                stamps: state.stamps,
                titles: state.titles
            }));
        }

        function loadProgress() {
            const data = localStorage.getItem('sanpo_palette_v3');
            if (data) {
                const parsed = JSON.parse(data);
                state.distance = parsed.distance || 0;
                state.stamps = parsed.stamps || [];
                state.titles = parsed.titles || [];
                updateStatsUI();
            }
        }

        // Start Walk Button
        document.getElementById('start-walk-btn').addEventListener('click', () => {
            if (state.currentRoute.length === 0) {
                generateRoute('circular');
            } else {
                // Add start point as final if not present
                if (state.currentRoute[state.currentRoute.length-1].name !== "スタート地点") {
                    state.currentRoute.push({ lat: state.pos[0], lng: state.pos[1], name: "スタート地点" });
                }
                startWalk();
            }
        });

        // Initialize Lucide
        lucide.createIcons();
    </script>
</body>
</html>

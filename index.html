<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Midnight Stroll - 深夜の散歩ガイド</title>
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Leaflet CSS & JS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Google Fonts: Playfair Display (Editorial) & Noto Sans JP -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        midnight: '#050814',
                        moon: '#F4D03F',
                        wood: '#2D241E',
                        sand: '#F5F2ED',
                        sage: '#5A6B5D',
                    },
                    fontFamily: {
                        serif: ['Playfair Display', 'serif'],
                        sans: ['Noto Sans JP', 'sans-serif'],
                    },
                }
            }
        }
    </script>

    <style type="text/tailwindcss">
        @layer components {
            .midnight-card {
                @apply bg-[#0A1023]/90 backdrop-blur-xl border border-white/10 shadow-2xl;
            }
            .btn-primary {
                @apply px-6 py-3 rounded-full font-bold transition-all active:scale-95 flex items-center justify-center gap-2;
            }
            .no-scrollbar::-webkit-scrollbar { display: none; }
        }

        #map { height: 45vh; width: 100%; z-index: 10; }

        /* Midnight Map Style */
        .midnight-map .leaflet-container { background: #050814; }
        .midnight-map .leaflet-bar a { background-color: #1A1F35 !important; color: white !important; border-bottom: 1px solid #2A2F45 !important; }

        /* Cat Animation */
        @keyframes tail-wag {
            0%, 100% { transform: rotate(0deg); }
            50% { transform: rotate(10deg); }
        }
        .cat-tail { animation: tail-wag 2s infinite ease-in-out; transform-origin: bottom; }
    </style>
</head>
<body class="bg-sand text-wood font-sans transition-colors duration-700 overflow-x-hidden" id="body">

    <!-- Geolocation Status Overlay -->
    <div id="geo-overlay" class="fixed inset-0 z-[200] bg-midnight/90 flex flex-col items-center justify-center p-6 text-white text-center transition-opacity duration-500">
        <div class="mb-6 relative">
            <i data-lucide="map-pin" class="w-16 h-16 text-moon animate-bounce"></i>
            <div class="absolute -bottom-2 -right-2 bg-white rounded-full p-1 text-midnight">
                <i data-lucide="search" class="w-4 h-4"></i>
            </div>
        </div>
        <h2 class="text-2xl font-bold mb-2 font-serif italic">Finding your path...</h2>
        <p class="text-white/60 mb-8" id="geo-status">現在地を取得しています。ブラウザの許可を確認してください。</p>
        <button id="retry-btn" class="hidden btn-primary bg-moon text-midnight px-10">
            <i data-lucide="refresh-cw" class="w-5 h-5"></i>
            再試行する
        </button>
    </div>

    <!-- Header -->
    <header id="app-header" class="fixed top-0 left-0 right-0 z-50 px-6 py-4 flex justify-between items-center transition-all duration-500">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-wood rounded-xl flex items-center justify-center text-white shadow-lg transition-all duration-500" id="logo-box">
                <i data-lucide="moon" class="w-6 h-6" id="logo-icon"></i>
            </div>
            <div class="flex flex-col">
                <h1 class="text-xl font-bold tracking-tight font-serif italic leading-none" id="app-title">Midnight Stroll</h1>
                <span class="text-[10px] uppercase tracking-[0.2em] opacity-60" id="app-subtitle">Urban Exploration</span>
            </div>
            <!-- Cat Icon (Midnight Mode Only) -->
            <div id="header-cat" class="hidden text-moon transition-all">
                <i data-lucide="cat" class="w-6 h-6"></i>
            </div>
        </div>
        <button id="mode-toggle" class="w-12 h-12 rounded-full bg-white shadow-md flex items-center justify-center transition-all hover:shadow-lg active:scale-90">
            <i data-lucide="sun" id="mode-icon" class="w-6 h-6 text-orange-500"></i>
        </button>
    </header>

    <main class="pt-20 pb-28">
        <!-- Map Section -->
        <section class="px-4 mb-8">
            <div id="map-container" class="rounded-[2.5rem] overflow-hidden shadow-2xl border-4 border-white transition-all duration-500 relative">
                <div id="map"></div>
                <!-- Floating Cat (Midnight Mode Only) -->
                <div id="floating-cat" class="hidden absolute bottom-4 right-4 z-20 text-moon/40 pointer-events-none">
                    <i data-lucide="cat" class="w-12 h-12"></i>
                </div>
            </div>
        </section>

        <!-- Recommended Course Section -->
        <section class="px-6 mb-10">
            <div class="flex items-center gap-2 mb-4">
                <i data-lucide="sparkles" class="w-5 h-5 text-moon"></i>
                <h2 class="text-2xl font-bold font-serif italic" id="course-title">おすすめのコース</h2>
            </div>
            <div id="course-card" class="bg-white rounded-3xl p-6 shadow-xl border border-black/5 flex justify-between items-center transition-all duration-500">
                <div>
                    <h3 class="font-bold text-lg mb-1" id="course-name">月明かりの静寂ルート</h3>
                    <p class="text-sm opacity-60" id="course-meta">3スポット • 約45分</p>
                </div>
                <button class="w-14 h-14 bg-wood text-white rounded-2xl flex items-center justify-center shadow-lg active:scale-90 transition-all" id="course-btn">
                    <i data-lucide="play" class="w-6 h-6 fill-current"></i>
                </button>
            </div>
        </section>

        <!-- POI List -->
        <section class="px-6">
            <div class="flex justify-between items-end mb-6">
                <h2 class="text-xl font-bold font-serif italic" id="list-title">近くのスポット</h2>
                <span class="text-xs opacity-40" id="list-count">12 locations found</span>
            </div>
            <div id="poi-list" class="space-y-4">
                <!-- POI Items will be injected here -->
            </div>
        </section>
    </main>

    <!-- Bottom Navigation -->
    <nav id="bottom-nav" class="fixed bottom-0 left-0 right-0 z-50 px-6 py-6 transition-all duration-500">
        <div class="max-w-md mx-auto bg-white rounded-[2rem] flex justify-around items-center p-3 shadow-[0_20px_50px_rgba(0,0,0,0.2)] transition-all duration-500" id="nav-inner">
            <button class="flex flex-col items-center gap-1 group">
                <div class="w-12 h-12 rounded-2xl flex items-center justify-center bg-wood text-white shadow-lg transition-all" id="nav-btn-1">
                    <i data-lucide="map" class="w-6 h-6"></i>
                </div>
                <span class="text-[10px] font-bold" id="nav-label-1">近くのスポット</span>
            </button>
            <button class="flex flex-col items-center gap-1 opacity-40 hover:opacity-100 transition-all group">
                <div class="w-12 h-12 rounded-2xl flex items-center justify-center transition-all">
                    <i data-lucide="ghost" class="w-6 h-6"></i>
                </div>
                <span class="text-[10px] font-bold" id="nav-label-2">深夜徘徊モード</span>
            </button>
            <button class="flex flex-col items-center gap-1 opacity-40 hover:opacity-100 transition-all group">
                <div class="w-12 h-12 rounded-2xl flex items-center justify-center transition-all">
                    <i data-lucide="user" class="w-6 h-6"></i>
                </div>
                <span class="text-[10px] font-bold" id="nav-label-3">マイページ</span>
            </button>
        </div>
    </nav>

    <!-- Modal Overlay -->
    <div id="modal-overlay" class="fixed inset-0 z-[100] bg-black/80 backdrop-blur-md flex items-center justify-center p-6 hidden transition-opacity duration-300">
        <div class="w-full max-w-lg rounded-[3rem] p-10 space-y-8 bg-white text-wood shadow-2xl relative transform transition-all duration-300 scale-95 opacity-0" id="modal-content">
            <button id="modal-close" class="absolute top-8 right-8 opacity-40 hover:opacity-100">
                <i data-lucide="x" class="w-8 h-8"></i>
            </button>
            
            <div class="space-y-3">
                <span id="modal-category" class="text-xs font-bold uppercase tracking-[0.3em] text-sage">Category</span>
                <h3 id="modal-name" class="text-4xl font-bold font-serif italic">Spot Name</h3>
            </div>
            
            <p id="modal-desc" class="leading-relaxed text-lg opacity-70">
                深夜の散歩にぴったりの静かな場所です。
            </p>
            
            <div class="flex flex-col gap-4 pt-6">
                <button id="modal-audio-btn" class="btn-primary bg-sand text-wood h-16 text-lg">
                    <i data-lucide="volume-2" class="w-6 h-6"></i>
                    音声ガイドを聞く
                </button>
                <button id="modal-stamp-btn" class="btn-primary bg-wood text-white h-16 text-lg shadow-xl">
                    <i data-lucide="check-circle" class="w-6 h-6"></i>
                    スタンプを押す
                </button>
            </div>
        </div>
    </div>

    <script>
        // --- Data ---
        const CATEGORY_LABELS = { park: '公園', shrine: '神社・仏閣', cafe: '深夜カフェ', view: '展望スポット', store: '24時間営業' };
        const MOCK_POIS = [
            { id: 1, name: '代々木公園', category: 'park', lat: 35.6717, lng: 139.6949, distance: 0.8 },
            { id: 2, name: '明治神宮', category: 'shrine', lat: 35.6764, lng: 139.6993, distance: 1.2 },
            { id: 3, name: '深夜の純喫茶', category: 'cafe', lat: 35.6680, lng: 139.7020, distance: 0.5 },
            { id: 4, name: '渋谷スカイ', category: 'view', lat: 35.6585, lng: 139.7013, distance: 1.5 },
            { id: 5, name: '24hブックストア', category: 'store', lat: 35.6620, lng: 139.7050, distance: 0.9 },
            { id: 6, name: '北谷公園', category: 'park', lat: 35.6635, lng: 139.6990, distance: 0.3 },
            { id: 7, name: '東郷神社', category: 'shrine', lat: 35.6710, lng: 139.7055, distance: 1.1 },
            { id: 8, name: '夜景の見える歩道橋', category: 'view', lat: 35.6650, lng: 139.7100, distance: 1.8 },
            { id: 9, name: '深夜のコインランドリー', category: 'store', lat: 35.6600, lng: 139.6950, distance: 0.7 },
            { id: 10, name: '宮下パーク', category: 'park', lat: 35.6615, lng: 139.7025, distance: 0.4 },
        ];

        // --- State ---
        let state = {
            isMidnight: false,
            pois: MOCK_POIS,
            stamps: JSON.parse(localStorage.getItem('stamps') || '[]'),
            userPos: [35.6660, 139.7000],
            map: null,
            markers: [],
            userMarker: null
        };

        // --- Geolocation ---
        function getLocation() {
            const statusText = document.getElementById('geo-status');
            const retryBtn = document.getElementById('retry-btn');
            const overlay = document.getElementById('geo-overlay');

            statusText.innerText = "現在地を取得しています...";
            retryBtn.classList.add('hidden');

            const options = { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 };

            navigator.geolocation.getCurrentPosition(
                (pos) => {
                    state.userPos = [pos.coords.latitude, pos.coords.longitude];
                    overlay.classList.add('opacity-0');
                    setTimeout(() => overlay.classList.add('hidden'), 500);
                    initOrUpdateMap();
                },
                (err) => {
                    console.error(err);
                    statusText.innerText = "位置情報の取得に失敗しました。設定を確認してください。";
                    retryBtn.classList.remove('hidden');
                },
                options
            );
        }

        // --- Map ---
        function initOrUpdateMap() {
            if (!state.map) {
                state.map = L.map('map', { zoomControl: false, attributionControl: false }).setView(state.userPos, 15);
                updateMapTiles();
            } else {
                state.map.setView(state.userPos, 15);
            }

            if (state.userMarker) state.map.removeLayer(state.userMarker);
            state.userMarker = L.circleMarker(state.userPos, {
                radius: 10, fillColor: "#3b82f6", color: "#fff", weight: 4, fillOpacity: 1
            }).addTo(state.map);

            renderMarkers();
        }

        function updateMapTiles() {
            if (state.map.tileLayer) state.map.removeLayer(state.map.tileLayer);
            const url = state.isMidnight 
                ? 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png'
                : 'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png';
            state.map.tileLayer = L.tileLayer(url).addTo(state.map);
        }

        function renderMarkers() {
            state.markers.forEach(m => state.map.removeLayer(m));
            state.markers = [];
            state.pois.forEach(poi => {
                const isStamped = state.stamps.includes(poi.id);
                const color = isStamped ? '#5A6B5D' : (state.isMidnight ? '#F4D03F' : '#2D241E');
                const marker = L.circleMarker([poi.lat, poi.lng], {
                    radius: 7, fillColor: color, color: "#fff", weight: 2, fillOpacity: 0.9
                }).addTo(state.map);
                marker.on('click', () => openPOI(poi.id));
                state.markers.push(marker);
            });
        }

        // --- UI Rendering ---
        function renderUI() {
            const body = document.getElementById('body');
            const logoBox = document.getElementById('logo-box');
            const modeIcon = document.getElementById('mode-icon');
            const mapContainer = document.getElementById('map-container');
            const navInner = document.getElementById('nav-inner');
            const courseCard = document.getElementById('course-card');
            const headerCat = document.getElementById('header-cat');
            const floatingCat = document.getElementById('floating-cat');

            if (state.isMidnight) {
                body.classList.replace('bg-sand', 'bg-midnight');
                body.classList.replace('text-wood', 'text-white');
                logoBox.classList.replace('bg-wood', 'bg-moon');
                logoBox.classList.replace('text-white', 'text-midnight');
                modeIcon.setAttribute('data-lucide', 'moon');
                modeIcon.classList.replace('text-orange-500', 'text-moon');
                mapContainer.classList.replace('border-white', 'border-white/10');
                navInner.classList.replace('bg-white', 'bg-[#0A1023]');
                navInner.classList.add('border', 'border-white/10', 'text-white');
                courseCard.classList.replace('bg-white', 'bg-[#0A1023]');
                courseCard.classList.add('border-white/10');
                headerCat.classList.remove('hidden');
                floatingCat.classList.remove('hidden');
                document.getElementById('nav-btn-1').classList.replace('bg-wood', 'bg-moon');
                document.getElementById('nav-btn-1').classList.replace('text-white', 'text-midnight');
                document.body.classList.add('midnight-map', 'midnight-mode');
            } else {
                body.classList.replace('bg-midnight', 'bg-sand');
                body.classList.replace('text-white', 'text-wood');
                logoBox.classList.replace('bg-moon', 'bg-wood');
                logoBox.classList.replace('text-midnight', 'text-white');
                modeIcon.setAttribute('data-lucide', 'sun');
                modeIcon.classList.replace('text-moon', 'text-orange-500');
                mapContainer.classList.replace('border-white/10', 'border-white');
                navInner.classList.replace('bg-[#0A1023]', 'bg-white');
                navInner.classList.remove('border', 'border-white/10', 'text-white');
                courseCard.classList.replace('bg-[#0A1023]', 'bg-white');
                courseCard.classList.remove('border-white/10');
                headerCat.classList.add('hidden');
                floatingCat.classList.add('hidden');
                document.getElementById('nav-btn-1').classList.replace('bg-moon', 'bg-wood');
                document.getElementById('nav-btn-1').classList.replace('text-midnight', 'text-white');
                document.body.classList.remove('midnight-map', 'midnight-mode');
            }

            renderPOIList();
            updateMapTiles();
            lucide.createIcons();
        }

        function renderPOIList() {
            const listContainer = document.getElementById('poi-list');
            listContainer.innerHTML = '';
            state.pois.forEach(poi => {
                const isStamped = state.stamps.includes(poi.id);
                const item = document.createElement('div');
                const cardClass = state.isMidnight ? 'midnight-card' : 'bg-white shadow-lg';
                const textClass = state.isMidnight ? 'text-white' : 'text-wood';
                const accentClass = state.isMidnight ? 'text-moon' : 'text-sage';

                item.className = `${cardClass} rounded-[2rem] p-6 flex justify-between items-center cursor-pointer hover:scale-[1.02] transition-all`;
                item.onclick = () => openPOI(poi.id);
                item.innerHTML = `
                    <div class="flex items-center gap-5">
                        <div class="w-14 h-14 rounded-2xl bg-moon/10 flex items-center justify-center ${accentClass}">
                            <i data-lucide="${getCategoryIcon(poi.category)}" class="w-7 h-7"></i>
                        </div>
                        <div>
                            <h3 class="font-bold text-lg ${textClass}">${poi.name}</h3>
                            <p class="text-xs opacity-50 uppercase tracking-widest">${CATEGORY_LABELS[poi.category]} • ${poi.distance}km</p>
                        </div>
                    </div>
                    <div class="${isStamped ? 'text-moon' : 'opacity-10'}">
                        <i data-lucide="award" class="w-8 h-8"></i>
                    </div>
                `;
                listContainer.appendChild(item);
            });
            lucide.createIcons();
        }

        function getCategoryIcon(cat) {
            switch(cat) {
                case 'park': return 'tree-pine';
                case 'shrine': return 'landmark';
                case 'cafe': return 'coffee';
                case 'view': return 'camera';
                case 'store': return 'shopping-bag';
                default: return 'map-pin';
            }
        }

        // --- Interactions ---
        function openPOI(id) {
            const poi = state.pois.find(p => p.id === id);
            const modal = document.getElementById('modal-overlay');
            const content = document.getElementById('modal-content');
            const isStamped = state.stamps.includes(poi.id);

            document.getElementById('modal-name').innerText = poi.name;
            document.getElementById('modal-category').innerText = CATEGORY_LABELS[poi.category];
            document.getElementById('modal-desc').innerText = `${poi.name}は深夜の静寂に包まれた特別なスポットです。月明かりの下で、日常を忘れるひとときを。`;
            
            const stampBtn = document.getElementById('modal-stamp-btn');
            stampBtn.innerText = isStamped ? 'スタンプ取得済み' : 'スタンプを押す';
            stampBtn.onclick = () => { toggleStamp(poi.id); closeModal(); };

            if (state.isMidnight) {
                content.className = 'w-full max-w-lg rounded-[3rem] p-10 space-y-8 midnight-card text-white shadow-2xl relative transform transition-all duration-300 scale-100 opacity-100';
                document.getElementById('modal-audio-btn').classList.replace('bg-sand', 'bg-white/10');
                stampBtn.classList.replace('bg-wood', 'bg-moon');
                stampBtn.classList.replace('text-white', 'text-midnight');
            } else {
                content.className = 'w-full max-w-lg rounded-[3rem] p-10 space-y-8 bg-white text-wood shadow-2xl relative transform transition-all duration-300 scale-100 opacity-100';
                document.getElementById('modal-audio-btn').classList.replace('bg-white/10', 'bg-sand');
                stampBtn.classList.replace('bg-moon', 'bg-wood');
                stampBtn.classList.replace('text-midnight', 'text-white');
            }

            modal.classList.remove('hidden');
            setTimeout(() => content.classList.replace('opacity-0', 'opacity-100'), 10);
        }

        function closeModal() {
            document.getElementById('modal-overlay').classList.add('hidden');
        }

        function toggleStamp(id) {
            if (state.stamps.includes(id)) {
                state.stamps = state.stamps.filter(sid => sid !== id);
            } else {
                state.stamps.push(id);
            }
            localStorage.setItem('stamps', JSON.stringify(state.stamps));
            document.getElementById('stamp-count').innerText = `${state.stamps.length} / ${state.pois.length}`;
            renderPOIList();
            renderMarkers();
        }

        // --- Init ---
        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            getLocation();

            document.getElementById('mode-toggle').onclick = () => {
                state.isMidnight = !state.isMidnight;
                renderUI();
            };
            document.getElementById('retry-btn').onclick = getLocation;
            document.getElementById('modal-close').onclick = closeModal;
            document.getElementById('modal-overlay').onclick = (e) => { if (e.target.id === 'modal-overlay') closeModal(); };
        });
    </script>
</body>
</html>
